    function notifyHost(payload) {
      try {
        const msg = JSON.stringify(payload);
        if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(msg);
        else if (window.parent) window.parent.postMessage(msg, '*');
      } catch (e) {}
    }

    function getFinalAudioMode() {
      const hasMusic = !!selectedMusicId;
      if (!hasMusic && !isOriginalMuted) return 'original';
      if (!hasMusic && isOriginalMuted) return 'mute';
      if (hasMusic && isOriginalMuted) return 'music';
      return 'music+original';
    }

    function getUploadURL() {
      const p = new URLSearchParams(window.location.search);
      let u = uploadURL || p.get('upload_url') || p.get('url');
      if(!u) try { u = new URLSearchParams(window.frameElement?.src?.split('?')[1]).get('upload_url'); } catch(e){}
      return u;
    }

    function buildAssetId(muxUploadUrl = '') {
      try {
        return muxUploadUrl.split('/').pop().split('?')[0];
      } catch (error) {
        return '';
      }
    }

    function updateFlashUI() {
      const isBack = facingMode === 'environment';
      if (!isBack) {
         flashBtn.classList.add('disabled');
         flashBtn.classList.remove('flash-on');
         flashIconPath.setAttribute('d', PATH_FLASH_OFF);
         return;
      } 
      flashBtn.classList.remove('disabled');
      if (torchEnabled) {
         flashBtn.classList.add('flash-on');
         flashIconPath.setAttribute('d', PATH_FLASH_ON);
      } else {
         flashBtn.classList.remove('flash-on');
         flashIconPath.setAttribute('d', PATH_FLASH_OFF);
      }
    }

    async function toggleFlash() {
      if (!mediaStream || facingMode !== 'environment') return;
      const track = mediaStream.getVideoTracks()[0];
      torchEnabled = !torchEnabled;
      try { await track.applyConstraints({ advanced: [{ torch: torchEnabled }] }); } 
      catch (err) { }
      updateFlashUI();
    }

    timerBtn.onclick = () => {
      if (isRecording || isCountingDown) return;
      if (timerDuration === 0) timerDuration = 5;
      else if (timerDuration === 5) timerDuration = 10;
      else timerDuration = 0;

      if (timerDuration === 0) {
        timerText.textContent = "OFF";
        timerBtn.classList.remove('active');
      } else {
        timerText.textContent = timerDuration + "s";
        timerBtn.classList.add('active');
      }
    };

    function startCountdownAndRecord() {
      if (isCountingDown) return;

      isCountingDown = true;
      let count = timerDuration;
      document.querySelector('.controls').style.opacity = '0.5';
      countdownDisplay.textContent = count;
      countdownDisplay.classList.add('active');
      
      playBeep(1000, 'short');

      const interval = setInterval(() => {
        count--;
        
        if (count > 1) { 
          countdownDisplay.textContent = count;
          playBeep(1000, 'short');
        } else if (count === 1) {
          countdownDisplay.textContent = count;
          playBeep(1500, 'long'); 
        } else {
          clearInterval(interval);
          countdownDisplay.classList.remove('active');
          document.querySelector('.controls').style.opacity = '1';
          isCountingDown = false;
          startRecording();
        }
      }, 1000);
    }

    async function startCamera() {
      if (uploadCompleted) return;
      if (startCamera.isStarting) return;
      cameraReady = false;
      pendingRecordUI = false;
      document.body.classList.add('camera-starting');
      cameraPreview.style.opacity = "0";
      
      if (mediaStream && mediaStream.active) {
        cameraPreview.srcObject = mediaStream;
        cameraPreview.play().catch(e=>{});
        ensureCameraVisible();

        markCameraReady();
        
        cameraPreview.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

        torchEnabled = false;
        updateFlashUI();
        
        setTimeout(() => {
           const track = mediaStream.getVideoTracks()[0];
           const caps = track.getCapabilities ? track.getCapabilities() : {};
           torchSupported = !!caps.torch;
           updateFlashUI();
           if (!cameraPreview.dataset.trackSettingsLogged && track.getSettings) {
             console.log('[camera] settings', track.getSettings());
             cameraPreview.dataset.trackSettingsLogged = 'true';
           }
        }, 300);
        return;
      }

      const constraints = {
        audio: true,
        video: { 
            facingMode: facingMode,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        }
      };

      try {
        startCamera.isStarting = true;
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        cameraPreview.srcObject = stream;
        cameraPreview.play().catch(e=>{});
        ensureCameraVisible();
        mediaStream = stream;

        markCameraReady();
        
        cameraPreview.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

        torchEnabled = false;
        updateFlashUI();
        
        setTimeout(() => {
           const track = mediaStream.getVideoTracks()[0];
           const caps = track.getCapabilities ? track.getCapabilities() : {};
           torchSupported = !!caps.torch;
           updateFlashUI();
           if (!cameraPreview.dataset.trackSettingsLogged && track.getSettings) {
             console.log('[camera] settings', track.getSettings());
             cameraPreview.dataset.trackSettingsLogged = 'true';
           }
        }, 300);

      } catch (error) {
        console.error(error);
      } finally {
        startCamera.isStarting = false;
      }
    }

    // --- LOGIQUE BOUTON ROBUSTE ---
    recordWrapBtn.onclick = async (e) => {
      e.stopPropagation();
      if (isToggleLocked) return;
      isToggleLocked = true;
      setTimeout(() => { isToggleLocked = false; }, 300);

      if (isRecording) {
        stopRecording();
      } else {
        if (timerDuration > 0) startCountdownAndRecord();
        else startRecording();
      }
    };

    async function startRecording() {
      const audioMissing = !mediaStream || mediaStream.getAudioTracks().length === 0;

      if (audioMissing) {
         await startCamera();
      }

      const hasAudioTrack = mediaStream && mediaStream.getAudioTracks().length > 0;
      if (isRecording || !mediaStream || !hasAudioTrack) {
          return;
      }
      
      recordedFacingMode = facingMode; 
      recordedChunks = [];
      
      let options = {
         mimeType: 'video/mp4',
         videoBitsPerSecond: facingMode === 'user' ? 6000000 : 10000000
      };
      
      if (!MediaRecorder.isTypeSupported('video/mp4')) {
          options = { videoBitsPerSecond: facingMode === 'user' ? 6000000 : 10000000 };
      }

      const streamForRecording = mediaStream;

      try { mediaRecorder = new MediaRecorder(streamForRecording, options); }
      catch(e) { mediaRecorder = new MediaRecorder(streamForRecording); }

      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
         recordedBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
         isRecording = false;
         finalizeRecording();
      };
      
      mediaRecorder.start();
      isRecording = true;
      if (cameraReady) {
         document.body.classList.add('recording');
      } else {
         pendingRecordUI = true;
      }
      
      recordingStartTime = Date.now();
      if (recordingTimer) {
         recordingTimer.textContent = '0:00';
      }
      progressCircle.style.strokeDashoffset = circumference;
      
      const tick = () => {
         if (!isRecording) return;
         const p = Math.min((Date.now() - recordingStartTime) / MAX_DURATION, 1);
         if (recordingTimer) {
           recordingTimer.textContent = formatElapsedTime(Date.now() - recordingStartTime);
         }
         progressCircle.style.strokeDashoffset = circumference * (1 - p);
         if (p < 1) progressInterval = requestAnimationFrame(tick);
         else stopRecording();
      };
      progressInterval = requestAnimationFrame(tick);
    }

    function stopRecording() {
       if (mediaRecorder && mediaRecorder.state === 'recording') {
           mediaRecorder.stop();
       } else if (isRecording) {
           isRecording = false;
           finalizeRecording();
       }
    }

    function finalizeRecording() {
       if(progressInterval) cancelAnimationFrame(progressInterval);
       document.body.classList.remove('recording');
       pendingRecordUI = false;
       progressCircle.style.strokeDashoffset = circumference;
       if (torchEnabled) toggleFlash();
       if (recordingTimer) {
           recordingTimer.textContent = '0:00';
       }
       shouldCheckDuration = false;
       if (previewTimeout) clearTimeout(previewTimeout);
       previewTimeout = setTimeout(() => {
           previewTimeout = null;
           galleryAudioNeedsRebuild = false;
           if (recordedBlob) showPreview(recordedBlob);
       }, 16);
    }

    // UX: figer le viewport pour éviter les recalculs de hauteur visibles
    function lockPreviewViewport() {
       const height = window.innerHeight;
       const width = window.innerWidth;
       previewOverlay.style.setProperty('--preview-viewport-height', `${height}px`);
       previewOverlay.style.setProperty('--preview-viewport-width', `${width}px`);
    }

    function unlockPreviewViewport() {
       previewOverlay.style.removeProperty('--preview-viewport-height');
       previewOverlay.style.removeProperty('--preview-viewport-width');
    }

    function resetThumbnailDefaults() {
       cancelScheduledThumbnailPreparation();
       selectedThumbnailTime = Number.NaN;
       thumbnailFrames = [];
       thumbnailFramesPromise = null;
       thumbnailItems = [];
       if (thumbnailStrip) thumbnailStrip.innerHTML = '';
       if (selectedThumbnailPreview) {
           selectedThumbnailPreview.style.backgroundImage = '';
           selectedThumbnailPreview.classList.remove('ready');
       }
       revokeAllThumbnailObjectUrls();
       if (thumbnailLoading) thumbnailLoading.hidden = true;
    }

    function showPreview(blob) {
       if (previewObjectURL) URL.revokeObjectURL(previewObjectURL);
       previewObjectURL = URL.createObjectURL(blob);
       lockPreviewViewport();
       previewVideo.src = previewObjectURL;
       syncOriginalMuteState();
       previewVideo.preload = 'auto';
       previewVideo.style.transform = recordedFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
       previewVideo.load();
       previewOverlay.classList.add('active');
       document.body.classList.add('showing-preview');
       console.debug('[music] gallery preview ready');

       // Sélection par défaut à chaque nouvelle preview
       resetThumbnailDefaults();
       resetMusicDefaults();
       closeFilterSheet();
       closeMusicSheet();

       syncOriginalMuteState();
       updateMusicSelectionUI();
       preloadInitialPreviewTracks();
       if (selectedMusicId !== null || musicOptions[0]) {
           const preloadTarget = musicOptions.find(opt => opt.id === selectedMusicId) || musicOptions[0];
           if (preloadTarget) {
               preloadAudioBuffer(preloadTarget.id, preloadTarget.url).catch(() => {});
           }
       }
       scheduleThumbnailPreparation();
    }

    function resetPreviewState() {
        if (previewTimeout) {
            clearTimeout(previewTimeout);
            previewTimeout = null;
        }
        stopMusicPreview({ hard: true });
        invalidateMusicSession();
        resetThumbnailDefaults();
        previewVideo.src = '';
        if (previewObjectURL) {
            URL.revokeObjectURL(previewObjectURL);
            previewObjectURL = null;
       }
       recordedBlob = null;
       videoDurationSeconds = 0;
    }

    function hidePreview() {
       previewOverlay.classList.remove('active');
       document.body.classList.remove('showing-preview');
       unlockPreviewViewport();
       resetPreviewState();

       if (!uploadCompleted && (!mediaStream || !mediaStream.active)) {
           startCamera();
       }
    }

    previewVideo.onloadedmetadata = () => {
        videoDurationSeconds = Math.max(0, Number(previewVideo.duration) || 0);
        if (shouldCheckDuration) {
            if (previewVideo.duration > 61) {
                const sec = Math.round(previewVideo.duration);
                hidePreview();
            }
            shouldCheckDuration = false;
        }
        if (videoDurationSeconds && selectedThumbnailTime > videoDurationSeconds) {
            setSelectedThumbnail(videoDurationSeconds);
        }
        setSeekLimits(currentMusicDuration);
        updateMusicOverlay();
        restartPreviewIfPlaying();
    };

    flashBtn.onclick = toggleFlash;
    
    switchBtn.onclick = () => {
       if (isRecording || isCountingDown || isSwitching) return;
       isSwitching = true;
       
       switchBtn.style.transform = "rotate(180deg)";
       if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
       
       facingMode = (facingMode === 'environment') ? 'user' : 'environment';
       
       startCamera().then(() => {
          setTimeout(() => switchBtn.style.transform = "rotate(0deg)", 300);
          isSwitching = false;
       }).catch(() => {
          isSwitching = false;
       });
    };
    
    // --- Galerie: Nettoyer la preview, couper micro, ouvrir menu ---
    galleryBtn.onclick = () => {
        // 💥 STOP TOUTES LES ACTIONS EN COURS
        stopMusicPreview({ hard: true });
        if (previewTimeout) {
            clearTimeout(previewTimeout);
            previewTimeout = null;
        }

        // 💥 VIDE IMMÉDIATEMENT TOUTES LES VARS QUI PEUVENT RELANCER UNE PREVIEW
        recordedBlob = null;
        shouldCheckDuration = false;

        // 💥 VIDE LES SOURCES VIDÉO AVANT hidePreview()
        previewVideo.src = '';
        if (previewObjectURL) {
            URL.revokeObjectURL(previewObjectURL);
            previewObjectURL = null;
        }

        // 💥 MAINTENANT on peut cacher la preview
        hidePreview();

        // 💥 On s’assure que le flux audio ne réutilise rien
        if (mediaStream) {
            mediaStream.getAudioTracks().forEach(track => track.stop());
        }

        // 💥 Reset du champ input
        galleryInput.value = '';

        galleryAudioNeedsRebuild = true;
        needsUserGestureAfterGallery = true;

        // Ouvre la galerie
        galleryInput.click();
    };
    
    function handleFileSelect(e) {
       const file = e.target.files[0];
       if(!file) {
           startCamera();
           return;
       }
       recordedBlob = file;
       shouldCheckDuration = true;
       showPreview(file);
       galleryAudioNeedsRebuild = true;
       e.target.value = '';
    }

    galleryInput.onchange = handleFileSelect;
    
    // --- CORRECTION CLÉ : Double nettoyage de la vidéo de prévisualisation ---
    restartBtn.onclick = () => {
        // Nettoyage explicite AVANT d'appeler hidePreview pour vider la source
        resetPreviewState();
        hidePreview();
    };
    // --- FIN CORRECTION CLÉ ---

    nextBtn.onclick = async () => {
       // Couper immédiatement la preview pour éviter le son pendant l'upload
       stopMusicPreview({ hard: true });
       let uploadPhaseTimeout = null;
       let uploadSuccessNotified = false;
       let processingStarted = false;

       function resetAfterUploadSuccess() {
          if (uploadPhaseTimeout) {
              clearTimeout(uploadPhaseTimeout);
              uploadPhaseTimeout = null;
          }
          stopUploadProgressAnimation();
          stopProcessingProgressAnimation();
          setUploadProgress(100);
          showUploadFinalizationMessage();
          uploadCompleted = true;
          previewOverlay.classList.remove('active');
          document.body.classList.remove('showing-preview');
          unlockPreviewViewport();
          resetPreviewState();
          recordedChunks = [];
          pendingRecordUI = false;
          if (mediaStream) {
              mediaStream.getTracks().forEach(track => track.stop());
              mediaStream = null;
          }
       }

       function fail(step, detail = '') {
          const msg = `Échec (${step})${detail ? ' : ' + detail : ''}`;
          console.error('[UPLOAD ERROR]', step, detail);
          stopUploadProgressAnimation();
          stopProcessingProgressAnimation();
          if (uploadPhaseTimeout) {
              clearTimeout(uploadPhaseTimeout);
              uploadPhaseTimeout = null;
          }
          setUploadStatusText(msg);
          setTimeout(() => uploadOverlay.classList.remove('active'), 4000);
       }

       function handleUploadSuccess(assetId) {
          if (!assetId || uploadSuccessNotified) return;
          uploadSuccessNotified = true;
          stopProcessingProgressAnimation();
          setUploadProgress(100);
          showUploadFinalizationMessage();
          notifyHost({ status: 'success', action: 'next_page', asset_id: assetId });
          resetAfterUploadSuccess();
       }

       const muxUploadUrl = getUploadURL();
       uploadOverlay.classList.add('active');
       setUploadStatusText("Préparation...");
       if(!muxUploadUrl || !recordedBlob) {
          if (!recordedBlob) {
             fail('no-video');
          } else {
             fail('no-mux-upload-url');
          }
          return;
       }
       setUploadProgress(0);

       const selectedMusic = getSelectedMusic();
       const audioMode = getFinalAudioMode();
       const isFastPath =
         recordedFacingMode === 'environment' &&
         audioMode === 'original' &&
         !selectedMusicId &&
         isOriginalMuted === false;

       const startServerUpload = () => {
         const formData = new FormData();
         formData.append('video', recordedBlob, recordedBlob.name || 'recording.mp4');
         formData.append('facingMode', recordedFacingMode);
         formData.append('audioMode', audioMode);
         formData.append('muxUploadUrl', muxUploadUrl);
         formData.append('thumbnailTime', String(Number.isFinite(selectedThumbnailTime) ? selectedThumbnailTime : DEFAULT_THUMBNAIL_TIME));
         if (selectedMusic) {
            formData.append('musicUrl', selectedMusic.url || '');
            formData.append('musicStart', String(musicStartTime || 0));
            formData.append('musicVolume', String(musicVolume || 0));
         }

         const xhr = new XMLHttpRequest();
         xhr.open(
           'POST',
           'https://feednly-video-audio-v2-506631399204.europe-west1.run.app/process-upload',
           true
         );
         console.log('[UPLOAD] sending request', {
            url: xhr.responseURL || 'unknown',
            audioMode,
            hasMusic: !!selectedMusic,
            blobSize: recordedBlob?.size
         });
       xhr.upload.onprogress = e => {
           if (!e.lengthComputable) return;
            const percent = Math.round((e.loaded / e.total) * 70);
            if (percent < 70) {
                setUploadProgress(percent);
                return;
            }
            setUploadProgress(70);
            if (!processingStarted) {
                processingStarted = true;
                startProcessingProgress({ target: 99, durationMs: 14000 });
            }
        };
        xhr.onload = () => {
            if(xhr.status < 300) {
               if (uploadPhaseTimeout) {
                  clearTimeout(uploadPhaseTimeout);
                  uploadPhaseTimeout = null;
               }
               stopUploadProgressAnimation();
               let res = {};
               let assetId = '';
               try {
                  res = JSON.parse(xhr.responseText || '{}');
                  assetId = res.asset_id || '';
               } catch (error) {
                  fail('json-parse');
                  return;
               }
               if (!assetId) {
                  fail('invalid-response', JSON.stringify(res));
                  return;
               }
               handleUploadSuccess(assetId);
            } else {
               fail('http-error', 'status ' + xhr.status + ' – ' + xhr.responseText.slice(0,200));
            }
         };
         xhr.onerror = () => {
            fail('network-error');
         };
         xhr.send(formData);
       };

       const uploadDirectToMux = async () => {
         console.log('[FAST_PATH_DIRECT_MUX]', {
           facingMode: recordedFacingMode,
           audioMode,
           hasMusic: !!selectedMusicId,
           isOriginalMuted
         });
         startEstimatedUploadProgress(recordedBlob?.size || 0);
         const uploadRes = await fetch(muxUploadUrl, {
           method: 'PUT',
           headers: { 'Content-Type': 'video/mp4' },
           body: recordedBlob,
           duplex: 'half'
         });
         stopUploadProgressAnimation();
         if (!uploadRes.ok) {
           throw new Error(`Mux upload failed: ${uploadRes.status}`);
         }
         startProcessingProgress({ target: 99, durationMs: 4000 });
         const assetId = buildAssetId(muxUploadUrl);
         if (!assetId) {
           throw new Error('invalid mux upload url');
         }
         return assetId;
       };

       if (isFastPath) {
          try {
             const assetId = await uploadDirectToMux();
             if (uploadPhaseTimeout) {
                clearTimeout(uploadPhaseTimeout);
                uploadPhaseTimeout = null;
             }
             handleUploadSuccess(assetId);
             return;
          } catch (error) {
             console.warn('[FAST_PATH_DIRECT_MUX] fallback to server', error);
             stopUploadProgressAnimation();
             setUploadProgress(0);
          }
       }

       startServerUpload();
    };
    
    previewOverlay.onclick = async (e) => {
      const tappedAction = e.target.closest('.action-btn') || e.target.closest('#preview-actions');
      const tappedSheet = e.target.closest('.sheet');
      if (musicFilterSheet.classList.contains('active') && !tappedSheet) {
         if (musicFilterSheet.classList.contains('active')) {
            closeFilterSheet();
         } else {
            closeMusicSheet();
         }
         return;
      }
      if (!tappedAction) {
         return;
      }
    };

    // --- TEMPORAIRE : message pour ReactNativeWebView ---
    setTimeout(() => {
      window.ReactNativeWebView?.postMessage("test-message");
    }, 3000);

    startCamera();

  </script>
</body>

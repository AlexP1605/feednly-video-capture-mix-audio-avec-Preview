<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Camera Pro V42 (Double Nettoyage d'État)</title>
  <style>
    :root {
      --glass-bg: rgba(20, 20, 20, 0.65);
      --glass-border: rgba(255, 255, 255, 0.2);
      --primary: #ff3b30;
      --active-timer: #ffcc00;
      --flash-active: #ffcc00;
      --preview-audio-control-size: 52px;
      --preview-top-control-offset: calc(env(safe-area-inset-top) - 4px);
    }

    /* Désactivation globale de la sélection native pour un comportement "app-like". */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    /* Exception explicite : les champs de saisie doivent rester sélectionnables. */
    input,
    textarea,
    select {
      user-select: auto;
      -webkit-user-select: auto;
      -webkit-touch-callout: default;
    }

    html { width: 100%; height: 100%; background: #000; overflow: hidden; overflow-x: hidden; }

    body {
      margin: 0; width: 100%; height: 100dvh; background: #000;
      font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; overflow-x: hidden;
    }

    body.camera-starting * {
      transition: none !important;
      animation: none !important;
    }

    /* --- CAMERA --- */
    #camera-container { position: absolute; inset: 0; z-index: 1; background: #000; }

    #camera-preview {
      opacity: 0;
      transition: none;
      will-change: opacity, transform;
    }

    video {
      width: 100%; height: 100%; object-fit: cover; display: block;
      pointer-events: none;
    }
    video::-webkit-media-controls { display: none !important; }

    /* --- COUNTDOWN --- */
    #countdown-display {
      position: fixed; inset: 0; z-index: 40;
      display: flex; align-items: center; justify-content: center;
      font-size: 180px; font-weight: 800; color: #fff;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 0; transform: scale(0.5);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #countdown-display.active { opacity: 1; transform: scale(1); }

    /* --- CONTROLS --- */
    .controls { position: absolute; inset: 0; z-index: 20; pointer-events: none; }
    
    .top-bar { 
      position: absolute; top: 0; width: 100%; 
      padding-top: max(20px, env(safe-area-inset-top));
      height: 80px;
      display: flex; justify-content: center; align-items: center; 
      pointer-events: auto;
    }
    
    .bottom-bar { 
      position: absolute; bottom: 0; width: 100%; 
      padding: 0 30px calc(20px + env(safe-area-inset-bottom)) 30px; 
      display: flex; align-items: center; justify-content: space-between; 
      z-index: 30;
    }

    body.recording .top-bar, body.recording .bottom-bar .side { opacity: 0; pointer-events: none; }

    .side { pointer-events: auto; }
    
    .btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(10px);
      color: #fff; font-weight: 600; font-size: 14px;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.9); }
    body.camera-starting .btn:active { transform: none !important; }
    
    .btn.flash-on { border-color: var(--flash-active); }
    .btn.flash-on svg { fill: var(--flash-active); }
    
    #timer-btn { position: absolute; right: 20px; width: auto; padding: 0 14px; border-radius: 24px; gap: 6px; }
    #timer-btn.active { background: rgba(255, 204, 0, 0.3); border-color: var(--active-timer); color: var(--active-timer); }
    #timer-btn svg { width: 20px; height: 20px; fill: currentColor; }

    .btn.disabled { opacity: 0.5; } 
    .btn svg { width: 24px; height: 24px; fill: white; transition: fill 0.2s; }

    /* --- RECORD BUTTON (ZONE AGRANDIE) --- */
    .record-wrap { 
      position: relative;
      width: 90px; height: 90px;
      min-width: 90px; min-height: 90px;
      max-width: 90px; max-height: 90px;
      flex: 0 0 90px;
      display: flex; align-items: center; justify-content: center; 
      pointer-events: auto; cursor: pointer; 
      -webkit-tap-highlight-color: transparent;
    }
    
    .record-progress {
      position: absolute; inset: -3px;
      width: 96px; height: 96px;
      min-width: 96px; min-height: 96px;
      max-width: 96px; max-height: 96px;
      flex: 0 0 96px;
      display: block;
      transform: rotate(-90deg);
      pointer-events: none;
    }
    .record-progress circle { fill: none; stroke: var(--primary); stroke-width: 5px; stroke-linecap: round; stroke-dasharray: 0 999; transition: stroke-dashoffset 0.1s linear; }
    
    .record-button {
      width: 72px; height: 72px;
      min-width: 72px; min-height: 72px;
      max-width: 72px; max-height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      pointer-events: none;
    }
    
    body.recording .record-button { background: var(--primary); border-color: rgba(255,255,255,0.6); animation: pulse 1.5s infinite; }
    body.recording .record-inner { width: 35%; height: 35%; background: #fff; border-radius: 6px; }
    .record-inner { width: 100%; height: 100%; border-radius: 50%; transition: all 0.2s; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
    body.camera-starting .record-button {
      animation: none !important;
      box-shadow: none !important;
    }

    /* --- PREVIEW UI --- */
    #preview-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #000;
      display: none;
      opacity: 0;
      flex-direction: column;
      transition: opacity 0.2s ease;
      width: var(--preview-viewport-width, 100%);
      height: var(--preview-viewport-height, 100dvh);
      overflow: hidden;
    }
    #preview-overlay.active { display: flex; opacity: 1; }
    .preview-video-container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      flex: 1;
      position: relative;
      overflow: hidden;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: max(16px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
    }
    #preview-video {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      background: #000;
    }

    .thumbnail-strip-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .music-overlay-row {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .music-overlay {
      padding: 0 14px;
      z-index: 10;
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(135deg, rgba(15,15,15,0.9), rgba(25,25,25,0.9));
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px; color: #fff; font-size: 13px; backdrop-filter: blur(14px);
      cursor: pointer; box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      min-height: var(--preview-audio-control-size);
      height: var(--preview-audio-control-size);
      max-width: 240px;
      pointer-events: auto;
    }
    .music-overlay.hidden { display: none; }
    .music-overlay.empty {
      justify-content: center;
    }
    .music-overlay.empty .music-clear { display: none; }
    .music-meta { display: flex; flex-direction: column; min-width: 0; }
    .music-title { font-weight: 800; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    .music-artist, .music-duration { display: none; }
    .music-visual { display: inline-flex; align-items: center; justify-content: center; gap: 10px; min-width: 0; }
    .music-overlay.empty .music-visual { width: auto; justify-content: center; }
    .music-overlay.empty .music-meta { flex: 1; min-width: 0; text-align: center; }
    .music-overlay.empty .music-title { max-width: none; }
    .music-icon { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; display: block; }

    .music-clear {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: #fff;
      display: grid; place-items: center; flex-shrink: 0;
      transition: all 0.2s;
    }
    .music-clear svg { width: 12px; height: 12px; }
    .music-clear:active { transform: scale(0.92); }
    .preview-audio-toggle {
      position: absolute;
      right: 18px;
      top: 0;
      width: var(--preview-audio-control-size);
      height: var(--preview-audio-control-size);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(15,15,15,0.8);
      display: grid;
      place-items: center;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      transition: transform 0.2s ease;
      pointer-events: auto;
    }
    .preview-audio-toggle:active { transform: scale(0.92); }
    .preview-audio-toggle svg { width: 22px; height: 22px; fill: currentColor; }

    .thumbnail-button {
      position: absolute;
      bottom: 18px;
      left: 18px;
      width: 62px;
      height: 62px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(20,20,20,0.7);
      background-size: cover;
      background-position: center;
      box-shadow: 0 12px 24px rgba(0,0,0,0.4);
      cursor: pointer;
      z-index: 8;
      display: grid;
      place-items: center;
    }

    .thumbnail-preview-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .thumbnail-preview {
      width: min(200px, 60vw);
      aspect-ratio: 2 / 3;
      border-radius: 16px;
      border: none;
      outline: none;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      background-size: cover;
      background-position: center;
      box-shadow: 0 18px 30px rgba(0,0,0,0.45);
      opacity: 0;
      transform: scale(0.98);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .thumbnail-preview.ready {
      opacity: 1;
      transform: scale(1);
    }
    .thumbnail-label {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }

    .thumbnail-strip {
      display: flex;
      --thumb-count: 8;
      --thumb-gap: 2px;
      gap: var(--thumb-gap);
      overflow-x: hidden;
      overflow-y: visible;
      padding: 0;
      touch-action: none;
      overscroll-behavior: contain;
      flex-wrap: nowrap;
      align-items: center;
      height: 82px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      scrollbar-width: none;
      -ms-overflow-style: none;
      width: 100%;
      max-width: 100vw;
      margin: 0 auto;
    }
    .thumbnail-strip::-webkit-scrollbar { display: none; }
    .thumbnail-frame {
      width: calc((100% - (var(--thumb-count) - 1) * var(--thumb-gap)) / var(--thumb-count));
      aspect-ratio: 9 / 16;
      height: auto;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      background-size: cover;
      background-position: center;
      flex: 0 0 auto;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      position: relative;
      opacity: 0.35;
    }
    .thumbnail-frame.active {
      transform: scale(1.12); /* Fix: zoom plus doux pour la miniature active */
      border-color: transparent; /* Fix: supprime le contour actif */
      box-shadow: 0 12px 24px rgba(0,0,0,0.35);
      opacity: 1;
    }
    .thumbnail-loading {
      font-size: 13px;
      opacity: 0.7;
      text-align: center;
      padding: 18px 0;
    }
    .inline-music-controls {
      position: relative;
      left: auto;
      right: auto;
      bottom: auto;
      transform: none;
      height: auto;
      max-height: none;
      box-shadow: none;
      border-top-left-radius: 26px;
      border-top-right-radius: 26px;
    }
    .original-audio-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
    }
    .original-audio-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #fff;
    }

    .sheet-backdrop {
      position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.75));
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 60;
    }
    .sheet-backdrop.active { opacity: 1; pointer-events: auto; }
    .sheet { position: absolute; left: 0; right: 0; bottom: 0; padding: 20px 18px 0; display: flex; flex-direction: column; gap: 18px; background: rgba(10,10,10,0.96); color: #fff; border-top-left-radius: 26px; border-top-right-radius: 26px; transform: translateY(100%); transition: transform 0.36s cubic-bezier(0.22, 1, 0.36, 1); z-index: 80; box-shadow: 0 -18px 40px rgba(0,0,0,0.55); height: 80dvh; max-height: 80dvh; overflow: hidden; overflow-x: hidden; pointer-events: none; will-change: transform; }
    .sheet.active { transform: translateY(0); pointer-events: auto; }
    #music-filter-sheet { height: 30dvh; max-height: 30dvh; }
    .sheet .sheet-handle { width: 70px; height: 6px; border-radius: 10px; background: #2f2f2f; align-self: center; margin-bottom: 4px; }
    .sheet-content { display: flex; flex-direction: column; gap: 18px; flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 24px; }
    .sheet header { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .sheet .title { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; font-weight: 800; letter-spacing: 0.3px; text-align: center; }
    .sheet label { font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .sheet input[type="search"] { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid #2b2b2d; background: #131316; color: #fff; font-size: 14px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
    @supports (-webkit-touch-callout: none) {
      .sheet input[type="search"] { font-size: 16px; }
    }
    .sheet select, .sheet input[type="range"] { flex: 1; padding: 8px 10px; border-radius: 12px; border: 1px solid #2b2b2d; background: #151519; color: #fff; }
    .sheet .toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; background: rgba(255,255,255,0.04); padding: 12px; border-radius: 14px; border: 1px solid #1f1f24; }
    .music-search-row { display: flex; gap: 10px; align-items: center; }
    .music-search-row input[type="search"] { flex: 1 1 auto; min-width: 0; width: auto; }
    .music-filter-btn {
      height: 44px;
      min-width: 44px;
      padding: 0 12px;
      border-radius: 14px;
      border: 1px solid #2b2b2d;
      background: #151519;
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .music-filter-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .tag-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .tag-chip {
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .tag-chip.active {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.4);
    }
    #music-list {
      flex: 1;
      min-height: 0;
      max-height: none;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 6px 0 4px;
    }
    .music-item { padding: 12px 12px; border-radius: 14px; border: 1px solid #1f1f1f; background: linear-gradient(145deg, #121216, #0e0e10); display: flex; align-items: center; gap: 10px; cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
    .music-item.active { border-color: #fff; background: #1f1f1f; }
    .music-item .title { font-weight: 700; font-size: 14px; }
    .music-item .artist { font-size: 12px; color: #b5b5b5; }
    .music-list-cover { width: 50px; height: 50px; border-radius: 14px; background: rgba(255,255,255,0.08) center/cover no-repeat; border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); flex-shrink: 0; }
    .music-list-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; align-items: flex-start; text-align: left; }
    .music-list-duration { font-size: 12px; color: #dcdcdc; font-weight: 700; }
    .timeline-row { display: flex; flex-direction: column; gap: 8px; padding: 12px; border-radius: 16px; border: 1px solid #1d1d22; background: rgba(255,255,255,0.03); }
    .timeline-row .timeline-header { display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 13px; color: #e5e5e7; }
    .timeline-row .time-chip { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 6px 10px; font-size: 12px; letter-spacing: 0.2px; }
    .waveform-visual {
      height: 72px; border-radius: 14px; border: 1px solid #1f1f24; background: linear-gradient(145deg, #0f0f12, #121216);
      display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 3px; padding: 10px 12px; align-items: end;
      cursor: pointer; overflow: hidden; position: relative;
    }
    .waveform-visual span {
      display: block; width: 6px; align-self: end; border-radius: 6px 6px 2px 2px;
      background: linear-gradient(180deg, #7f7ff5, #5ecbfa);
      opacity: 0.35; transition: opacity 0.2s, transform 0.2s, background 0.2s;
      height: var(--bar-height, 30%);
    }
    .waveform-visual span.active { opacity: 1; box-shadow: 0 6px 14px rgba(94,203,250,0.35); transform: translateY(-2px); background: linear-gradient(180deg, #9dd8ff, #6ccfff); }
    .waveform-handle {
      position: absolute;
      top: 6px;
      bottom: 6px;
      width: 2px;
      background: rgba(255,255,255,0.9);
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
    }
    .waveform-handle::after {
      content: '';
      position: absolute;
      bottom: -6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #9dd8ff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      transform: translateY(50%);
    }
    .waveform-handle.end {
      background: rgba(255,255,255,0.65);
    }
    .waveform-handle.end::after {
      background: #6ccfff;
    }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .time-actions { display: flex; align-items: center; gap: 10px; }
    .icon-btn {
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: #fff;
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.2s ease;
      min-width: 40px;
      min-height: 36px;
    }
    .icon-btn svg { width: 20px; height: 20px; display: block; }
    /* UX: état de chargement immédiat pour l'aperçu musique */
    .icon-btn.loading {
      position: relative;
      cursor: default;
    }
    .icon-btn.loading svg { opacity: 0; }
    .icon-btn.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      box-sizing: border-box;
      animation: spin 0.8s linear infinite;
    }
    .icon-btn:active { transform: scale(0.95); }
    .icon-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .mixing-hint {
      margin: 0;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e5e5e7;
      font-size: 13px;
      line-height: 1.5;
    }
    .visually-hidden { position: absolute !important; height: 1px; width: 1px; overflow: hidden; clip: rect(1px, 1px, 1px, 1px); white-space: nowrap; }
    #preview-actions { width: 100%; height: 110px; min-height: 110px; background: #000; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 0 24px calc(env(safe-area-inset-bottom) + 10px); pointer-events: auto; position: fixed; left: 0; right: 0; bottom: 0; z-index: 10; }
    .action-btn { flex: 1; height: 54px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; border-radius: 14px; }
    #restart-button { background: #1c1c1e; color: #fff; border: 1px solid #333; }
    #next-button { background: #fff; color: #000; }

    #music-controls { position: absolute; left: 0; right: 0; bottom: 0; height: 75dvh; max-height: 75dvh; pointer-events: auto; }
    #music-controls header { justify-content: center; }
    #music-controls .title { text-align: center; }
    #volume-row { gap: 12px; }
    #volume-row label {

      padding: 0;

      font-weight: 800; font-size: 13px; letter-spacing: 0.2px;

      background: transparent;
      border-radius: 999px; outline: none; border: none;
    }
    #music-volume::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: #fff; border: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      margin-top: calc((8px - 18px) / 2);
    }
    #music-volume::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; border: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      margin-top: calc((8px - 18px) / 2);
    }
    #music-volume::-moz-range-track {
      height: 8px; border-radius: 999px; background: rgba(255,255,255,0.16);
      border: none; box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    #music-volume::-webkit-slider-runnable-track {
      height: 8px; border-radius: 999px; background: rgba(255,255,255,0.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .tab-bar {
      display: flex;
      gap: 10px;
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(255,255,255,0.12);

      border-radius: 16px;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;

    .tab-btn {

      height: 46px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.2s ease;
      display: grid;
      place-items: center;
    }

    .tab-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .tab-btn.active {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 10px 20px rgba(0,0,0,0.35);
    }

    .tab-btn .tab-label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .tab-panel { display: none; flex-direction: column; gap: 14px; }
    .tab-panel.active { display: flex; }
    .sheet header .title svg { width: 18px; height: 18px; fill: currentColor; }

    /* --- UPLOAD --- */
    #upload-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.2s; }
    #upload-overlay.active { opacity: 1; visibility: visible; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #upload-text {
      display: flex;
      flex-direction: column;
    }
    #upload-progress-text,
    #upload-mix-text {
      color: #fff;
      font-weight: 600;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease;
    }
    #upload-progress-text {
      font-size: 18px;
      order: 2;
      margin-top: 20px;
    }
    #upload-mix-text {
      font-size: 16px;
      line-height: 1.4;
      max-width: 320px;
      white-space: pre-line;
      opacity: 0;
      order: 0;
      margin-bottom: 20px;
    }
    #upload-text.show-mixing #upload-progress-text { opacity: 0; }
    #upload-text.show-mixing #upload-mix-text { opacity: 1; }
    #upload-overlay .spinner { order: 1; }

    /* --- ERROR TOAST --- */
    #error-toast {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: rgba(255, 59, 48, 0.9); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 12px 24px; border-radius: 30px;
      font-weight: 600; font-size: 14px; z-index: 200;
      opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none; text-align: center; width: 90%; max-width: 300px;
    }
    #error-toast.active { opacity: 1; transform: translateX(-50%) translateY(0); }

    #recording-timer {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 6px);
      left: 50%;
      transform: translateX(-50%);

      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    body.recording #recording-timer { opacity: 1; }

    input[type="file"] { display: none; }
    body.showing-preview .controls { display: none !important; }

    #preview-video {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      background: #000;
    }

  <script>
    const cameraPreview = document.getElementById('camera-preview');

    const musicOverlayArtist = musicOverlay.querySelector('.music-artist');
    const musicOverlayDuration = document.getElementById('music-duration');

    const musicListEl = document.getElementById('music-list');

    const musicFilterBtn = document.getElementById('music-filter-btn');
    const musicFilterTags = document.getElementById('music-filter-tags');
    const sheetBackdrop = document.getElementById('sheet-backdrop');
    const waveformVisual = document.getElementById('waveform-visual');
    const originalMuteToggleInput = document.getElementById('original-mute-toggle');
    const selectedThumbnailPreview = document.getElementById('selected-thumbnail-preview');
    const thumbnailStrip = document.getElementById('thumbnail-strip');
    const thumbnailLoading = document.getElementById('thumbnail-loading');
    let waveformHandleStart = null;
    let waveformHandleEnd = null;
    const tabWaveform = document.getElementById('tab-waveform');
    const tabMusicTab = document.getElementById('tab-music');
    const tabAudio = document.getElementById('tab-audio');
    const tabBtnMusic = document.getElementById('tab-btn-music');
    const tabBtnWaveform = document.getElementById('tab-btn-waveform');
    const tabBtnAudio = document.getElementById('tab-btn-audio');
    const musicTabBar = document.getElementById('music-tab-bar');
    let currentlyPlayingMusicId = null;

    const revealCameraPreview = () => {

    };
    const ensureCameraVisible = () => {
      revealCameraPreview();

      setTimeout(revealCameraPreview, 200);
    };
    const markCameraReady = () => {
      ensureCameraVisible();
      if (cameraReady) return;
      cameraReady = true;
      document.body.classList.remove('camera-starting');
      if (pendingRecordUI && isRecording) {
          document.body.classList.add('recording');
          pendingRecordUI = false;
      }
      scheduleSafeMusicPreload();
    };
    cameraPreview.addEventListener('loadeddata', markCameraReady);

    let mediaStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let recordedBlob = null;
    let previewObjectURL = null;
    let selectedThumbnailTime = 0.5;
    let thumbnailFrames = [];
    let thumbnailFramesPromise = null;
    let thumbnailItems = [];
    let thumbnailPrepareTimeout = null;
    let thumbnailPrepareRaf1 = 0;
    let thumbnailPrepareRaf2 = 0;
    const thumbnailObjectUrls = new Set();
    // UX: garder l'UI stable le temps que la caméra soit prête
    let cameraReady = false;
    let pendingRecordUI = false;

    // --- AJOUT MUSIQUE (prévisualisation uniquement) : catalogue et configuration ---
    const DEFAULT_MUSIC_OPTIONS = [
      {
        id: 'default',
        title: 'Default music',
        artist: 'Feednly',
        url: 'https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3'
      }
    ];

    const sanitizeMusicOptions = (list = []) => {
        if (!Array.isArray(list)) return [...DEFAULT_MUSIC_OPTIONS];
        const cleaned = list.filter(item => item && typeof item.url === 'string' && item.url.trim().length > 0);
        return cleaned.length ? cleaned : [...DEFAULT_MUSIC_OPTIONS];
    };

    let musicOptions = sanitizeMusicOptions(DEFAULT_MUSIC_OPTIONS);
    let musicVolume = 0.5; // Volume musique (0 → 1)
    let musicStartTime = 0; // Début sélection musique (s)
    let selectedMusicId = null; // Musique choisie pour la preview
    let currentMusicDuration = 30; // Durée connue pour le slider (s)
    const DEFAULT_TAG_LABEL = 'Aucun';
    const DEFAULT_TAG_VALUE = 'aucun';
    let activeTag = DEFAULT_TAG_VALUE;
    let isOriginalMuted = false;
    let musicSessionId = 0;
    const WAVEFORM_BAR_COUNT = 32;
    const TAG_OPTIONS = [DEFAULT_TAG_LABEL, 'Chill', 'Rap', 'Pop', 'Electro', 'Cinematic', 'Rock'];

    function invalidateMusicSession() {
        musicSessionId += 1;
        return musicSessionId;
    }

    function createCacheEntry({ id, url } = {}) {
        const entry = {
            buffer: null,
            promise: null,
            url: url || '',
            duration: null,
            lastUsedAt: 0,
            ids: new Set(),
            keys: new Set()
        };
        if (id !== undefined && id !== null) entry.ids.add(String(id));
        if (url) entry.ids.add(String(url));
        return entry;
    }

    function registerCacheKey(entry, key) {
        if (!entry || key === undefined || key === null || key === '') return;
        entry.keys.add(key);
        entry.ids.add(String(key));
        audioPreloadCache.set(key, entry);
    }

    function touchCacheEntry(entry) {
        if (!entry) return;
        entry.lastUsedAt = performance.now();
        if (entry.buffer?.duration && !entry.duration) {
            entry.duration = entry.buffer.duration;
        }
    }

    function evictCacheEntry(entry) {
        if (!entry || entry.promise) return;
        entry.buffer = null;
        entry.duration = entry.duration ?? null;
        entry.lastUsedAt = 0;
    }

    function enforceAudioPreloadLimit() {
        const protectedIds = new Set(
            [selectedMusicId, currentlyPlayingMusicId]
                .filter((value) => value !== null && value !== undefined)
                .map(value => String(value))
        );
        const uniqueEntries = [...new Set(audioPreloadCache.values())];
        const cachedEntries = uniqueEntries.filter(entry => entry.buffer);
        if (cachedEntries.length <= MAX_AUDIO_PRELOADS) return;
        const candidates = cachedEntries
            .filter(entry => !entry.promise)
            .sort((a, b) => (a.lastUsedAt || 0) - (b.lastUsedAt || 0));
        let remaining = cachedEntries.length;
        candidates.forEach((entry) => {
            if (remaining <= MAX_AUDIO_PRELOADS) return;
            const isProtected = [...entry.ids].some(id => protectedIds.has(id));
            if (isProtected) return;
            evictCacheEntry(entry);
            remaining -= 1;
        });
    }

    function getCachedAudioEntry(id, url) {
        let entry = null;
        if (id && audioPreloadCache.has(id)) {

        if (!url) return null;

        const entry = existing || createCacheEntry({ id, url });
        entry.url = url;
        registerCacheKey(entry, cacheKey);
        if (id && id !== cacheKey) {
            registerCacheKey(entry, id);

        entry.promise = (async () => {
            const audioCtx = ensureMusicAudioContext();
            if (!audioCtx) throw new Error('audio context unavailable');
            const response = await fetch(url, { cache: 'force-cache' });
            if (!response.ok) throw new Error('audio fetch failed');
            const arrayBuffer = await response.arrayBuffer();
            const buffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
            entry.buffer = buffer;
            entry.duration = Number.isFinite(buffer?.duration) ? buffer.duration : entry.duration;
            touchCacheEntry(entry);
            enforceAudioPreloadLimit();
            return entry.duration || null;
        })();

        try {
            return await entry.promise;
        } catch (error) {
            entry.buffer = null;
            entry.promise = null;
            entry.lastUsedAt = 0;
            if (entry.keys.size === 0) {

    function getThumbnailFrameTimes(durationSeconds) {
        const duration = Math.max(0.1, Number(durationSeconds) || 0.1);
        const step = Math.max(THUMBNAIL_MIN_STEP, Math.min(THUMBNAIL_MAX_STEP, duration / (THUMBNAIL_MAX_FRAMES - 1)));
        const count = Math.min(THUMBNAIL_MAX_FRAMES, Math.max(2, Math.floor(duration / step) + 1));
        const times = Array.from({ length: count }, (_, index) => Math.min(duration, index * step));
        if (times.length) {

    function getImmediateThumbnailTimes(durationSeconds) {

    function buildThumbnailTimeList(durationSeconds) {
        const baseTimes = getThumbnailFrameTimes(durationSeconds);
        const immediateTimes = getImmediateThumbnailTimes(durationSeconds);
        const adjustedTimes = [...baseTimes];
        immediateTimes.forEach((time) => {
            let closestIndex = 0;
            let closestDiff = Number.POSITIVE_INFINITY;
            adjustedTimes.forEach((value, index) => {
                const diff = Math.abs(value - time);
                if (diff < closestDiff) {
                    closestDiff = diff;
                    closestIndex = index;
                }
            });
            adjustedTimes[closestIndex] = time;
        });
        const sortedTimes = adjustedTimes.sort((a, b) => a - b);
        return sortedTimes.reduce((acc, time) => {
            const last = acc[acc.length - 1];
            const isImmediate = immediateTimes.some(immediate => Math.abs(immediate - time) < THUMBNAIL_TIME_TOLERANCE);
            if (acc.length && Math.abs(last - time) <= THUMBNAIL_TIME_TOLERANCE) {

            const maxWidthSmall = 300;
            canvasLarge.width = Math.min(maxWidthLarge, Math.max(1, thumbVideo.videoWidth || maxWidthLarge));
            canvasLarge.height = Math.round(canvasLarge.width / aspect);
            canvasSmall.width = Math.min(maxWidthSmall, Math.max(1, thumbVideo.videoWidth || maxWidthSmall));

                await seekVideoToTime(thumbVideo, time);

                ctxSmall.drawImage(thumbVideo, 0, 0, canvasSmall.width, canvasSmall.height);

                let urlSmall = '';

                        canvasToBlobAsync(canvasLarge, 'image/jpeg', 0.85),

                const index = frames.findIndex(
                    item => Math.abs(item.time - frame.time) <= THUMBNAIL_TIME_TOLERANCE

    function getLoopBounds() {
        const start = Math.max(0, Math.min(musicStartTime, currentMusicDuration));
        const end = Math.max(start + 0.05, getSelectionEnd());
        return { start, end };
    }

    function updatePositionLabel() {
        const endTime = getSelectionEnd();
        musicPositionLabel.textContent = `${formatTimeLabel(musicStartTime)} – ${formatTimeLabel(endTime)} / ${formatTimeLabel(currentMusicDuration)}`;
        updateWaveformHandles();
    }

    function setSeekLimits(durationSeconds) {
        currentMusicDuration = Math.max(5, durationSeconds || 30);
        clampStartForVideoDuration();
        updatePositionLabel();
        updateWaveformProgress();
    }

    function buildWaveformBars() {
        if (!waveformVisual) return;
        waveformVisual.innerHTML = '';
        waveformHandleStart = null;
        waveformHandleEnd = null;
        const seed = Math.max(1, [...(selectedMusicId || 'wave')].reduce((acc, ch) => acc + ch.charCodeAt(0), 0));
        for (let i = 0; i < WAVEFORM_BAR_COUNT; i++) {
            const bar = document.createElement('span');
            const noise = Math.abs(Math.sin((i + 1) * 0.43 * seed) * 65) + 18;
            bar.style.setProperty('--bar-height', `${Math.min(95, noise)}%`);
            waveformVisual.appendChild(bar);
        }
        if (!waveformHandleStart) {
            waveformHandleStart = document.createElement('div');
            waveformHandleStart.className = 'waveform-handle start';
            waveformVisual.appendChild(waveformHandleStart);
        }
        if (!waveformHandleEnd) {
            waveformHandleEnd = document.createElement('div');
            waveformHandleEnd.className = 'waveform-handle end';
            waveformVisual.appendChild(waveformHandleEnd);
        }
        updateWaveformProgress();
    }

    function updateWaveformProgress() {
        if (!waveformVisual) return;
        const bars = Array.from(waveformVisual.querySelectorAll('span'));
        const startRatio = currentMusicDuration ? Math.min(1, musicStartTime / currentMusicDuration) : 0;
        const endRatio = currentMusicDuration ? Math.min(1, getSelectionEnd() / currentMusicDuration) : 0;
        if (bars.length) {
            bars.forEach((bar, idx) => {
                const centerRatio = (idx + 0.5) / bars.length;
                const active = centerRatio >= startRatio && centerRatio <= endRatio;
                bar.classList.toggle('active', active);
            });
        }
        updateWaveformHandles();
    }

    function updateWaveformHandles() {
        if (!waveformVisual) return;
        const startRatio = currentMusicDuration ? Math.min(1, musicStartTime / currentMusicDuration) : 0;
        const endRatio = currentMusicDuration ? Math.min(1, getSelectionEnd() / currentMusicDuration) : 0;
        if (waveformHandleStart) {
            waveformHandleStart.style.left = `${startRatio * 100}%`;
        }
        if (waveformHandleEnd) {
            waveformHandleEnd.style.left = `${endRatio * 100}%`;
        }
    }

    function updateStartFromClientX(clientX) {
        if (!waveformVisual) return;
        const rect = waveformVisual.getBoundingClientRect();
        const x = Math.min(Math.max(clientX - rect.left, 0), rect.width);
        const ratio = x / rect.width;
        musicStartTime = ratio * currentMusicDuration;
        clampStartForVideoDuration();
        updateWaveformProgress();
        updatePositionLabel();
        const { start, end } = getLoopBounds();
        if (!musicEngine) return;
        musicEngine.updateLoop(start, end);
        if (musicEngine.isPlaying) {
            musicEngine.seekHtmlAudio(start);
        }
    }

    function handleWaveformInteraction(clientX) {
        updateStartFromClientX(clientX);
    }

    function normalizeTag(tag) {
        return String(tag || '').trim().toLowerCase();
    }

    function isDefaultTag(tag) {
        return !tag || tag === DEFAULT_TAG_VALUE;
    }

    function resetFilterTag() {
        activeTag = DEFAULT_TAG_VALUE;
        renderFilterTags();
        renderMusicList(musicSearchInput.value);
    }

    function getTrackTags(opt) {
        const tagList = [];
        const rawTags = opt?.tags;
        const rawGenre = opt?.genre;
        if (Array.isArray(rawTags)) {
            tagList.push(...rawTags);
        } else if (typeof rawTags === 'string') {
            tagList.push(...rawTags.split(','));
        }
        if (Array.isArray(rawGenre)) {
            tagList.push(...rawGenre);
        } else if (typeof rawGenre === 'string') {
            tagList.push(...rawGenre.split(','));
        }
        return tagList.map(normalizeTag).filter(Boolean);
    }

    function renderFilterTags() {
        if (!musicFilterTags) return;
        musicFilterTags.innerHTML = '';
        TAG_OPTIONS.forEach((tag) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'tag-chip';
            btn.textContent = tag;
            const normalized = normalizeTag(tag);
            if (activeTag === normalized) {
                btn.classList.add('active');
            }
            btn.onclick = () => {
                if (normalized === DEFAULT_TAG_VALUE) {
                    activeTag = DEFAULT_TAG_VALUE;
                } else {
                    activeTag = activeTag === normalized ? DEFAULT_TAG_VALUE : normalized;
                }
                renderFilterTags();
                renderMusicList(musicSearchInput.value);
            };
            musicFilterTags.appendChild(btn);
        });
    }

    function renderMusicList(filter = '') {
        const query = (filter || '').toLowerCase();
        musicListEl.innerHTML = '';
        const items = musicOptions.filter(opt => {
            const hay = `${opt.title} ${opt.artist}`.toLowerCase();
            const tags = getTrackTags(opt);
            const matchesTag = isDefaultTag(activeTag) || tags.some((tag) => tag.includes(activeTag) || activeTag.includes(tag));
            return hay.includes(query) && matchesTag;
        });
        if (!items.length) {
            const empty = document.createElement('div');
            empty.textContent = 'Aucun titre';
            empty.style.opacity = '0.7';
            empty.style.textAlign = 'center';
            empty.style.padding = '12px';
            musicListEl.appendChild(empty);
            setupMusicPreloadObserver();
            return;
        }
        const fragment = document.createDocumentFragment();
        items.forEach(opt => {
            const item = document.createElement('div');
            item.className = 'music-item' + (opt.id === selectedMusicId ? ' active' : '');
            item.dataset.musicId = String(opt.id || '');
            item.dataset.musicUrl = opt.url || '';
            const cover = document.createElement('div');
            cover.className = 'music-list-cover';
            cover.style.backgroundImage = opt.cover ? `url(${opt.cover})` : '';

            const meta = document.createElement('div');
            meta.className = 'music-list-meta';
            const title = document.createElement('div');
            title.className = 'title';
            title.textContent = opt.title;
            const artist = document.createElement('div');
            artist.className = 'artist';
            artist.textContent = opt.artist;
            meta.appendChild(title);
            meta.appendChild(artist);

            const duration = document.createElement('div');
            duration.className = 'music-list-duration';
            duration.textContent = opt.duration ? formatTimeLabel(Math.floor(Number(opt.duration) / 1000)) : '';

            item.appendChild(cover);
            item.appendChild(meta);
            item.appendChild(duration);
            const playBtn = document.createElement('button');
            playBtn.type = 'button';
            playBtn.className = 'icon-btn';
            const isPendingThis = pendingMusicId === opt.id;
            const isPlayingThis = currentlyPlayingMusicId === opt.id && (musicEngine?.isPlaying || isPendingThis);
            playBtn.innerHTML = isPlayingThis ? playIconPause() : playIconPlay();
            if (isPendingThis) {
                playBtn.classList.add('loading');
                playBtn.disabled = true;
                playBtn.setAttribute('aria-busy', 'true');
            }
            playBtn.onpointerdown = async (e) => {
                e.preventDefault();
                e.stopPropagation();

                // 🔴 GESTURE UTILISATEUR SYNCHRONE (OBLIGATOIRE)
                musicEngine.unlockAudioContext();

                if (needsUserGestureAfterGallery) {
                    // force un vrai unlock audio valide
                    await ensureMusicContextActive();
                    needsUserGestureAfterGallery = false;
                }
                galleryAudioNeedsRebuild = false;

                const alreadyPlaying =
                    currentlyPlayingMusicId === opt.id &&
                    (musicEngine?.isPlaying || pendingMusicId === opt.id);

                if (alreadyPlaying) {
                    stopMusicPreview();
                    return;
                }

                const { start, end } = getLoopBounds();
                const startedNow = musicEngine.playImmediateFromCache(opt.url, start, end, { id: opt.id });
                if (startedNow) {
                    currentlyPlayingMusicId = opt.id;
                    selectedMusicId = opt.id;
                    pendingMusicId = null;
                    updateMusicOverlay();
                    updateMusicListPlaybackState();
                    return;
                }

                startMusicPreview(opt);
            };
            item.appendChild(playBtn);
            item.addEventListener('pointerdown', () => {
                musicEngine?.unlockAudioContext();
            }, { once: true, passive: true });
            item.onclick = (e) => {
                e.stopPropagation();
                selectMusic(opt);
            };
            fragment.appendChild(item);
        });
        musicListEl.appendChild(fragment);
        setupMusicPreloadObserver();
    }

    function updateMusicListPlaybackState() {
        if (!musicListEl) return;
        const items = musicListEl.querySelectorAll('.music-item');
        items.forEach((item) => {
            const id = item.dataset.musicId;
            const playBtn = item.querySelector('.icon-btn');
            const isPendingThis = pendingMusicId !== null && String(pendingMusicId) === id;
            const isPlayingThis = currentlyPlayingMusicId !== null
                && String(currentlyPlayingMusicId) === id
                && (musicEngine?.isPlaying || isPendingThis);
            item.classList.toggle('active', selectedMusicId !== null && String(selectedMusicId) === id);
            if (!playBtn) return;
            playBtn.innerHTML = isPlayingThis ? playIconPause() : playIconPlay();
            playBtn.classList.toggle('loading', isPendingThis);
            playBtn.disabled = Boolean(isPendingThis);
            playBtn.setAttribute('aria-busy', isPendingThis ? 'true' : 'false');
        });
    }

    function updateSeekDurationFromMeta(opt) {
        const durationMs = Number(opt?.duration);
        if (!Number.isNaN(durationMs) && durationMs > 0) {
            setSeekLimits(Math.max(5, Math.floor(durationMs / 1000)));
        }
    }

    function selectMusic(opt) {
        if (!opt) return;
        const hadSelection = !!getSelectedMusic();
        const isNewSelection = selectedMusicId !== opt.id;
        stopMusicPreview();
        selectedMusicId = opt.id;
        if (isNewSelection) {
            musicStartTime = 0;
        }
        if (!hadSelection && parseFloat(musicVolumeInput.value || '0') === 0) {

        }
        updateMusicOverlay();
        updateSeekDurationFromMeta(opt);
        renderMusicList(musicSearchInput.value);

        updateMusicSelectionUI();

    function updateMusicOverlay() {
        const music = getSelectedMusic();
        musicOverlay.classList.toggle('empty', !selectedMusicId);
        if (!music) {
            musicOverlayTitle.textContent = 'Ajouter un son';
            musicOverlayArtist.textContent = '';

    function clearMusicSelection() {
        stopMusicPreview({ hard: true });
        invalidateMusicSession();
        selectedMusicId = null;
        currentlyPlayingMusicId = null;
        pendingMusicId = null;

    function resetMusicDefaults() {
        if (!musicOptions.length) {
            musicOptions = [...DEFAULT_MUSIC_OPTIONS];
        }
        selectedMusicId = null;
        applyMusicVolume(0.5, { updateEngine: false });
        musicStartTime = 0;
        musicSearchInput.value = '';
        syncVolumeLabels();
        setSeekLimits(currentMusicDuration);
        updateMusicOverlay();
        renderMusicList(musicSearchInput.value);
        updateMusicSelectionUI();

    const MAX_PRELOAD_ITEMS = 2;
    const visibleMusicIds = new Set();
    const preloadedMusicIds = new Set();
    let musicPreloadObserver = null;
    let musicPreloadIdleHandle = null;
    let isPreloadingVisibleMusic = false;

    function scheduleIdleTask(task, { timeout = 500, fallbackDelay = 120 } = {}) {
        if (typeof requestIdleCallback === 'function') {
            requestIdleCallback(() => task(), { timeout });
        } else {
            setTimeout(() => task(), fallbackDelay);
        }
    }

    function throttle(fn, wait = 50) {
        let lastCall = 0;
        let timeoutId = null;
        return (...args) => {
            const now = performance.now();
            const remaining = wait - (now - lastCall);
            if (remaining <= 0 || remaining > wait) {
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
                lastCall = now;
                fn(...args);
            } else if (!timeoutId) {
                timeoutId = setTimeout(() => {
                    lastCall = performance.now();
                    timeoutId = null;
                    fn(...args);
                }, remaining);
            }
        };
    }

    function enqueueMusicPreload(id, url, { allowWhenSelected = false } = {}) {
        if (!id || !url) return;
        if (!allowWhenSelected && selectedMusicId) return;
        const cached = getCachedAudioEntry(id, url);
        if (cached?.buffer || cached?.promise || preloadedMusicIds.has(id)) return;
        preloadedMusicIds.add(id);
        preloadAudioBuffer(id, url).catch(() => {
            preloadedMusicIds.delete(id);
        });
    }

    function preloadVisibleTracks({ maxItems = 2, allowWhenSelected = false } = {}) {
        if (!musicListEl) return;
        const items = [...musicListEl.querySelectorAll('.music-item')];
        const visibleOrdered = items.filter(item => visibleMusicIds.has(item.dataset.musicId));
        const candidates = visibleOrdered.length ? visibleOrdered : items.slice(0, maxItems);
        candidates.slice(0, maxItems).forEach((item) => {
            const id = item.dataset.musicId;
            const opt = musicOptions.find(opt => String(opt.id) === id);
            if (opt?.url) {
                enqueueMusicPreload(opt.id, opt.url, { allowWhenSelected });
            }
        });
    }

    function preloadInitialPreviewTracks() {
        scheduleIdleTask(() => {
            if (!selectedMusicId) {
                const first = musicOptions[0];
                if (first?.url) {
                    enqueueMusicPreload(first.id, first.url, { allowWhenSelected: true });
                }
            }
            preloadVisibleTracks({ maxItems: 2, allowWhenSelected: true });
        }, { timeout: 300, fallbackDelay: 80 });
    }

    function burstPreloadVisibleTracks() {
        scheduleIdleTask(() => {
            if (!musicListEl) return;
            const items = [...musicListEl.querySelectorAll('.music-item')];
            if (!items.length) return;
            const visibleOrdered = items.filter(item => visibleMusicIds.has(item.dataset.musicId));
            const ids = [];
            visibleOrdered.forEach(item => ids.push(item.dataset.musicId));
            if (visibleOrdered.length) {
                const lastVisibleIndex = items.findIndex(item => item.dataset.musicId === visibleOrdered[visibleOrdered.length - 1].dataset.musicId);
                const nextItem = items[lastVisibleIndex + 1];
                if (nextItem) ids.push(nextItem.dataset.musicId);
            } else {
                items.slice(0, 4).forEach(item => ids.push(item.dataset.musicId));
            }
            const deduped = [...new Set(ids)].slice(0, 4);
            deduped.forEach((id) => {
                const opt = musicOptions.find(opt => String(opt.id) === String(id));
                if (opt?.url) {
                    enqueueMusicPreload(opt.id, opt.url, { allowWhenSelected: true });
                }
            });
        }, { timeout: 400, fallbackDelay: 100 });
    }

    function processVisibleMusicPreloadQueue() {
        if (isPreloadingVisibleMusic) return;
        if (selectedMusicId) return;
        const candidates = [...visibleMusicIds]
            .filter(id => !preloadedMusicIds.has(id))
            .slice(0, MAX_PRELOAD_ITEMS);
        if (!candidates.length) return;
        isPreloadingVisibleMusic = true;
        const preloadNext = (deadline) => {
            if (!candidates.length) {
                isPreloadingVisibleMusic = false;
                return;
            }
            if (deadline && typeof deadline.timeRemaining === 'function' && deadline.timeRemaining() < 6) {
                isPreloadingVisibleMusic = false;
                scheduleVisibleMusicPreload();
                return;
            }
            const id = candidates.shift();
            const opt = musicOptions.find(opt => String(opt.id) === id);
            if (opt?.url) {
                enqueueMusicPreload(id, opt.url);
            }
            if (typeof requestIdleCallback === 'function') {
                requestIdleCallback(preloadNext, { timeout: 400 });
            } else {
                setTimeout(() => preloadNext(), 80);
            }
        };
        scheduleIdleTask(() => preloadNext(), { timeout: 400, fallbackDelay: 80 });
    }

    function scheduleVisibleMusicPreload() {
        if (musicPreloadIdleHandle) return;
        if (typeof requestIdleCallback === 'function') {
            musicPreloadIdleHandle = requestIdleCallback(() => {
                musicPreloadIdleHandle = null;
                processVisibleMusicPreloadQueue();
            }, { timeout: 500 });
        } else {
            musicPreloadIdleHandle = setTimeout(() => {
                musicPreloadIdleHandle = null;
                processVisibleMusicPreloadQueue();
            }, 120);
        }
    }

    function setupMusicPreloadObserver() {
        if (!musicListEl) return;
        if (!musicPreloadObserver) {
            musicPreloadObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const id = entry.target.dataset.musicId;
                    if (!id) return;
                    if (entry.isIntersecting) {
                        visibleMusicIds.add(id);
                    } else {
                        visibleMusicIds.delete(id);
                    }
                });
                scheduleVisibleMusicPreload();
            }, { root: musicListEl, threshold: 0.45 });
        } else {
            musicPreloadObserver.disconnect();
        }
        visibleMusicIds.clear();
        const items = musicListEl.querySelectorAll('.music-item');
        items.forEach(item => musicPreloadObserver.observe(item));
        scheduleVisibleMusicPreload();
    }

    async function loadMusicCatalog() {
        try {
            const res = await fetch('music.json');
            if (!res.ok) throw new Error('music catalog fetch failed');
            const data = await res.json();
            musicOptions = sanitizeMusicOptions(data);
        } catch (err) {
            console.warn('Using default music catalog', err);
            musicOptions = [...DEFAULT_MUSIC_OPTIONS];
        }

        resetMusicDefaults();
        const first = musicOptions[0];
        if (first) updateSeekDurationFromMeta(first);
    }

    loadMusicCatalog();
    renderFilterTags();

    function updateMusicSelectionUI() {
        const volumeVal = parseFloat(musicVolumeInput.value);
        applyMusicVolume(Number.isNaN(volumeVal) ? 0.5 : volumeVal);

    const handleMusicVolumeInput = (event) => {

        const rawValue = target?.valueAsNumber ?? parseFloat(target?.value);
        applyMusicVolume(Number.isNaN(rawValue) ? 0.5 : rawValue);

    musicVolumeInput?.addEventListener('input', handleMusicVolumeInput);
    musicVolumeInput?.addEventListener('change', handleMusicVolumeInput);
    musicVolumeInput?.addEventListener('pointermove', handleMusicVolumeInput);
    musicVolumeInput?.addEventListener('touchmove', handleMusicVolumeInput, { passive: true });
    if (waveformVisual) {
        waveformVisual.addEventListener('pointerdown', (e) => {
            isDraggingWaveform = true;
            waveformVisual.setPointerCapture?.(e.pointerId);
            updateStartFromClientX(e.clientX);
        });
        waveformVisual.addEventListener('pointermove', (e) => {
            if (!isDraggingWaveform) return;
            updateStartFromClientX(e.clientX);
        });
        const endDrag = (e) => {
            if (!isDraggingWaveform) return;
            isDraggingWaveform = false;
            waveformVisual.releasePointerCapture?.(e.pointerId);
        };
        waveformVisual.addEventListener('pointerup', endDrag);
        waveformVisual.addEventListener('pointercancel', endDrag);
        waveformVisual.onclick = (e) => handleWaveformInteraction(e.clientX);
        waveformVisual.addEventListener('touchend', (e) => {
            const touch = e.changedTouches?.[0];
            if (touch) handleWaveformInteraction(touch.clientX);
        }, { passive: true });
    }

    function updateActiveThumbnail() {
        if (!thumbnailStrip) return;
        const items = thumbnailItems.length ? thumbnailItems : thumbnailStrip.querySelectorAll('.thumbnail-frame');
        if (!items.length) return;
        let closestItem = null;
        let closestDistance = Number.POSITIVE_INFINITY;
        items.forEach((item) => {
            const itemTime = Number(item.dataset.time || 0);
            const distance = Math.abs(itemTime - selectedThumbnailTime);
            if (distance < closestDistance) {
                closestDistance = distance;
                closestItem = item;
            }
        });
        if (!closestItem) return;
        items.forEach((item) => item.classList.toggle('active', item === closestItem));
    }

    function getClosestThumbnailTimeByX(clientX) {
        if (!thumbnailStrip || !thumbnailFrames.length) return selectedThumbnailTime;
        const items = thumbnailItems.length ? thumbnailItems : thumbnailStrip.querySelectorAll('.thumbnail-frame');
        if (!items.length) return selectedThumbnailTime;
        let closestItem = null;
        let closestDistance = Number.POSITIVE_INFINITY;
        items.forEach((item) => {
            const rect = item.getBoundingClientRect();
            const center = rect.left + rect.width / 2;
            const distance = Math.abs(clientX - center);
            if (distance < closestDistance) {
                closestDistance = distance;
                closestItem = item;
            }
        });
        return Number(closestItem?.dataset.time || selectedThumbnailTime);
    }

    function handleThumbnailScrub(clientX) {
        const time = getClosestThumbnailTimeByX(clientX);
        setSelectedThumbnail(time);
    }

    if (thumbnailStrip) {
        let isDraggingThumbnail = false;
        thumbnailStrip.addEventListener('pointerdown', (event) => {
            if (!thumbnailFrames.length) return;
            isDraggingThumbnail = true;
            thumbnailStrip.setPointerCapture?.(event.pointerId);
            handleThumbnailScrub(event.clientX);
        });
        thumbnailStrip.addEventListener('pointermove', (event) => {
            if (!isDraggingThumbnail) return;
            handleThumbnailScrub(event.clientX);
        });
        const endDrag = (event) => {
            if (!isDraggingThumbnail) return;
            isDraggingThumbnail = false;
            thumbnailStrip.releasePointerCapture?.(event.pointerId);
        };
        thumbnailStrip.addEventListener('pointerup', endDrag);
        thumbnailStrip.addEventListener('pointercancel', endDrag);
    }

    function toggleOriginalMute(force) {
        if (typeof force === 'boolean') {

    let musicAudioCtx = null;

    function ensureMusicAudioContext() {
        if (!musicAudioCtx) {
            const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
            musicAudioCtx = new AudioContextCtor();
        }
        return musicAudioCtx;
    }

    function primeMusicAudioContext(audioCtx) {
        if (audioCtxPrimed || !audioCtx) return;
        try {
            const buffer = audioCtx.createBuffer(1, 1, audioCtx.sampleRate || 44100);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start(0);
            source.stop(0);
            source.disconnect();
        } catch (error) {
            // no-op: priming is best-effort only
        }
        audioCtxPrimed = true;
    }

    function unlockMusicAudioContext() {
        const audioCtx = ensureMusicAudioContext();
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().catch(() => {});
        }
        primeMusicAudioContext(audioCtx);
    }

    async function ensureMusicContextActive() {
        const audioCtx = ensureMusicAudioContext();
        if (!audioCtx) return null;
        if (audioCtx.state === 'suspended' || musicContextNeedsResume) {
            try {
                await audioCtx.resume();
            } catch (error) {
                // no-op: resume is best-effort and may require a user gesture
            }
        }
        primeMusicAudioContext(audioCtx);
        if (audioCtx.state !== 'running') {
            audioCtxPrimed = false;
        }
        musicContextNeedsResume = audioCtx.state !== 'running';
        if (musicContextNeedsResume) return null;
        return audioCtx;
    }

    function playBeep(freq = 800, type = 'short') {
        const audioCtx = ensureMusicAudioContext();
        if (!audioCtx) return;
        const duration = type === 'long' ? 0.18 : 0.08;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.value = 0;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.25, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.start(now);
        osc.stop(now + duration + 0.02);
        osc.onended = () => {
            osc.disconnect();
            gain.disconnect();
        };
    }

    function createMusicEngine() {

        let currentId = null;
        let currentBuffer = null;
        let musicSourceNode = null;
        let musicGainNode = null;
        let loopStartTime = 0;
        let loopEndTime = 0;
        let startPerf = 0;
        let isPlaying = false;
        let playSession = 0;

        const ensureMusicGainNode = () => {
            const audioCtx = ensureMusicAudioContext();
            if (!musicGainNode) {
                musicGainNode = audioCtx.createGain();
                musicGainNode.gain.value = clampVolume(musicVolume);
                musicGainNode.connect(audioCtx.destination);
            }
            return { audioCtx, gainNode: musicGainNode };
        };

        const primeAudioGraph = () => {
            ensureMusicGainNode();
        };

        const rebuildAudioGraph = () => {
            stopCurrentSource();
            if (musicGainNode) {
                try {
                    musicGainNode.disconnect();
                } catch (error) {
                    // no-op: best-effort cleanup
                }
            }
            musicGainNode = null;
            primeAudioGraph();
        };

        const stopCurrentSource = () => {
            if (!musicSourceNode) {
                isPlaying = false;
                startPerf = 0;
                return;
            }
            try {
                musicSourceNode.onended = null;
                musicSourceNode.stop(0);
            } catch (error) {
                // no-op: source may already be stopped
            }
            musicSourceNode.disconnect();
            musicSourceNode = null;
            isPlaying = false;
            startPerf = 0;
        };

        const playImmediateFromCache = (url, startTime, endTime, { id = null } = {}) => {
            if (!url) return false;
            const session = ++playSession;
            currentUrl = url;
            currentId = id;

            // unlock sans await (best-effort)
            unlockMusicAudioContext();

            const cacheKey = id || url;
            const cached = getCachedAudioEntry(cacheKey, url);
            const buffer = cached?.buffer;
            if (!buffer) return false;

            // start immédiat (clé iOS)
            return startBufferSource(buffer, startTime, endTime, session);
        };

        const computeLoopBounds = (buffer, startTime, endTime) => {
            const duration = Math.max(0, buffer?.duration || 0);
            if (!duration) {
                return { start: 0, end: 0.05 };
            }
            const startMax = Math.max(0, duration - 0.05);
            const start = Math.min(Math.max(0, startTime || 0), startMax);
            const requestedEnd = Number.isFinite(endTime) && endTime > 0 ? endTime : duration;
            const end = Math.min(duration, Math.max(start + 0.05, requestedEnd));
            return { start, end };
        };

        const startBufferSource = (buffer, startTime, endTime, session) => {
            if (!buffer) return false;
            const { audioCtx, gainNode } = ensureMusicGainNode();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().catch(() => {});
            }
            stopCurrentSource();
            const bounds = computeLoopBounds(buffer, startTime, endTime);
            loopStartTime = bounds.start;
            loopEndTime = bounds.end;
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            source.loopStart = loopStartTime;
            source.loopEnd = loopEndTime;
            source.connect(gainNode);
            source.onended = () => {
                if (session !== playSession) return;
                if (musicSourceNode === source) {
                    musicSourceNode.disconnect();
                    musicSourceNode = null;
                }
                isPlaying = false;
            };
            musicSourceNode = source;
            currentBuffer = buffer;
            isPlaying = true;
            startPerf = performance.now();
            // start immediately once we have a decoded buffer
            source.start(0, loopStartTime);
            return true;
        };

        const resolveBuffer = async (id, url) => {
            const cached = getCachedAudioEntry(id, url);
            if (cached?.buffer) return cached.buffer;
            await preloadAudioBuffer(id, url);
            return getCachedAudioEntry(id, url)?.buffer || null;
        };

        const load = async (url, { id } = {}) => {
            if (!url) return null;
            currentUrl = url;
            currentId = id ?? null;
            primeAudioGraph();
            const duration = await preloadAudioBuffer(id || url, url);
            if (duration) return duration;
            const cached = getCachedAudioEntry(id, url);
            return cached?.duration || null;
        };

        const stop = () => {
            playSession += 1;
            stopCurrentSource();
        };

        const play = async (startTime, endTime) => {
            if (!currentUrl) return false;
            const result = await playBufferAudio(currentUrl, startTime, endTime, { id: currentId });
            return result;
        };

        const updateLoop = (startTime, endTime) => {
            loopStartTime = Math.max(0, startTime || 0);
            loopEndTime = Math.max(loopStartTime + 0.05, endTime || loopEndTime || loopStartTime + 0.05);
            if (isPlaying && currentBuffer) {

            }
        };

            const volume = clampVolume(value);
            const { audioCtx, gainNode } = ensureMusicGainNode();
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
        };

        const clearBuffer = () => {
            currentUrl = '';
            currentId = null;
            currentBuffer = null;
        };

        const getCachedBuffer = (cacheKey, url) => {
            return getCachedAudioEntry(cacheKey, url)?.buffer || null;
        };

        const playBufferAudio = async (url, startTime, endTime, { id = null, buffer = null, restart = false } = {}) => {
            if (!url) return false;
            const session = ++playSession;
            currentUrl = url;
            currentId = id;
            const cacheKey = id || url;
            const cachedBuffer = buffer || getCachedBuffer(cacheKey, url);
            if (cachedBuffer) {

                const activeCtx = await ensureMusicContextActive();

            }
            const targetBuffer = await resolveBuffer(cacheKey, url);

                }

            }
            if (session !== playSession && !restart) return false;
            const activeCtx = await ensureMusicContextActive();
            if (!activeCtx) return false;
            const started = startBufferSource(targetBuffer, startTime, endTime, session);
            return started;
        };

            const nextStart = Math.max(0, startTime || 0);
            if (!currentBuffer || !currentUrl) return;
            const end = Math.max(nextStart + 0.05, loopEndTime || currentBuffer.duration || nextStart + 0.05);
            playBufferAudio(currentUrl, nextStart, end, { id: currentId, buffer: currentBuffer, restart: true });
        };

        const getHtmlAudioState = () => ({
            isPlaying,
            currentTime: loopStartTime || 0,
            startPerf
        });

        const unlockAudioContext = () => {
            unlockMusicAudioContext();
            primeAudioGraph();
            updateVolume(musicVolume);
        };

        const refreshAudioGraph = () => {
            unlockMusicAudioContext();
            rebuildAudioGraph();
            updateVolume(musicVolume);
        };

        const getAudioContext = () => ensureMusicAudioContext();

        return {
            load,
            play,
            stop,
            updateLoop,
            updateVolume,
            clearBuffer,
            playHtmlAudio: playBufferAudio,
            playImmediateFromCache,
            seekHtmlAudio,
            getHtmlAudioState,
            unlockAudioContext,
            refreshAudioGraph,
            getAudioContext,

    async function startMusicPreview(opt) {
        if (!opt || !musicEngine) return;
        const galleryReady = await ensureGalleryAudioReady();
        if (!galleryReady) {
            return;
        }
        const sessionId = musicSessionId;
        const expectedId = opt.id;
        const perf = DEBUG_AUDIO ? { id: opt.id, tClick: performance.now() } : null;
        const isNewSelection = selectedMusicId !== opt.id;

        if (currentlyPlayingMusicId && currentlyPlayingMusicId !== opt.id) {
            stopMusicPreview({ hard: false });

        selectedMusicId = opt.id;
        currentlyPlayingMusicId = opt.id;
        pendingMusicId = opt.id;
        if (isNewSelection) {

        const { start, end } = getLoopBounds();
        musicEngine.updateVolume(musicVolume);
        console.debug('[music] preview graph', { volume: musicVolume, start, end });
        let started = false;
        try {
            started = await musicEngine.playHtmlAudio(opt.url, start, end, { id: opt.id });
        } catch {
            started = false;
        }

        if (started) {
            const htmlState = musicEngine.getHtmlAudioState();
            if (perf) {
                perf.tSoundStart = htmlState.startPerf || performance.now();
                logAudioPerf({ ...perf });
            }
            if (sessionId === musicSessionId && selectedMusicId === expectedId && pendingMusicId === expectedId) {
                pendingMusicId = null;
                updateMusicListPlaybackState();
            }
        }

        preloadAudioBuffer(opt.id, opt.url).then((duration) => {
            if (duration) {
                setSeekLimits(Math.floor(duration));
            }
        }).catch(() => {});

        if (sessionId !== musicSessionId || selectedMusicId !== expectedId) {
            if (!started) {
                musicEngine.stop();
            }
            return;
        }
        if (!started) {
            currentlyPlayingMusicId = null;
        }
        pendingMusicId = null;
        updateMusicListPlaybackState();
    }

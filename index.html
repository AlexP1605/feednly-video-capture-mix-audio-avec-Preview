<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Camera Pro</title>
  <style>
    :root {
      --glass-bg: rgba(20, 20, 20, 0.65);
      --glass-border: rgba(255, 255, 255, 0.2);
      --primary: #ff3b30;
      --active-timer: #ffcc00;
      --flash-active: #ffcc00;
      --preview-actions-height: 110px;
      --app-viewport-height: 100svh;
      --app-viewport-width: 100vw;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    input, textarea, select {
      user-select: auto;
      -webkit-user-select: auto;
      -webkit-touch-callout: default;
    }

    html { width: 100%; height: 100%; background: #000; overflow: hidden; overflow-x: hidden; }

    body {
      margin: 0; width: 100%; height: var(--app-viewport-height, 100svh);
      min-height: var(--app-viewport-height, 100svh);
      max-height: var(--app-viewport-height, 100svh);
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden; overflow-x: hidden;
    }

    body.camera-starting * { transition: none !important; animation: none !important; }

    /* --- CAMERA --- */
    #camera-container { position: absolute; inset: 0; z-index: 1; background: #000; }
    #camera-preview { opacity: 0; transition: none; will-change: opacity, transform; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
    video::-webkit-media-controls { display: none !important; }

    /* --- COUNTDOWN --- */
    #countdown-display {
      position: fixed; inset: 0; z-index: 40;
      display: flex; align-items: center; justify-content: center;
      font-size: 180px; font-weight: 800; color: #fff;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 0; transform: scale(0.5);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #countdown-display.active { opacity: 1; transform: scale(1); }

    /* --- CONTROLS --- */
    .controls { position: absolute; inset: 0; z-index: 20; pointer-events: none; }
    .top-bar {
      position: absolute; top: 0; width: 100%;
      padding-top: max(20px, env(safe-area-inset-top));
      height: 80px;
      display: flex; justify-content: center; align-items: center;
      pointer-events: auto;
    }
    .bottom-bar {
      position: absolute; bottom: 0; width: 100%;
      padding: 0 30px calc(20px + env(safe-area-inset-bottom)) 30px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 30;
    }
    body.recording .top-bar, body.recording .bottom-bar .side { opacity: 0; pointer-events: none; }
    .side { pointer-events: auto; }
    .btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(10px);
      color: #fff; font-weight: 600; font-size: 14px;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.9); }
    body.camera-starting .btn:active { transform: none !important; }
    .btn.flash-on { border-color: var(--flash-active); }
    .btn.flash-on svg { fill: var(--flash-active); }
    #timer-btn { position: absolute; right: 20px; width: auto; padding: 0 14px; border-radius: 24px; gap: 6px; }
    #timer-btn.active { background: rgba(255, 204, 0, 0.3); border-color: var(--active-timer); color: var(--active-timer); }
    #timer-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .btn.disabled { opacity: 0.5; }
    .btn svg { width: 24px; height: 24px; fill: white; transition: fill 0.2s; }

    /* --- RECORD BUTTON --- */
    .record-wrap {
      position: relative; width: 90px; height: 90px;
      min-width: 90px; min-height: 90px; max-width: 90px; max-height: 90px;
      flex: 0 0 90px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .record-progress {
      position: absolute; inset: -3px; width: 96px; height: 96px;
      min-width: 96px; min-height: 96px; max-width: 96px; max-height: 96px;
      flex: 0 0 96px; display: block; transform: rotate(-90deg); pointer-events: none;
    }
    .record-progress circle { fill: none; stroke: var(--primary); stroke-width: 5px; stroke-linecap: round; stroke-dasharray: 0 999; transition: stroke-dashoffset 0.1s linear; }
    .record-button {
      width: 72px; height: 72px; min-width: 72px; min-height: 72px;
      max-width: 72px; max-height: 72px; border-radius: 50%; background: #fff;
      border: 4px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s; pointer-events: none;
    }
    body.recording .record-button { background: var(--primary); border-color: rgba(255,255,255,0.6); animation: pulse 1.5s infinite; }
    body.recording .record-inner { width: 35%; height: 35%; background: #fff; border-radius: 6px; }
    .record-inner { width: 100%; height: 100%; border-radius: 50%; transition: all 0.2s; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
    body.camera-starting .record-button { animation: none !important; box-shadow: none !important; }

    /* =====================================================
       PREVIEW OVERLAY — TikTok style fullscreen
       ===================================================== */
    #preview-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: #000;
      display: none; opacity: 0;
      transition: opacity 0.2s ease;
      width: var(--preview-viewport-width, var(--app-viewport-width, 100vw));
      height: var(--preview-viewport-height, var(--app-viewport-height, 100svh));
      overflow: hidden;
    }
    #preview-overlay.active { display: block; opacity: 1; }

    /* Vidéo plein écran en fond */
    #preview-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      pointer-events: none;
      background: #000;
    }

    /* Gradient de lisibilité en bas */
    .preview-scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.25) 0%,
        transparent 25%,
        transparent 55%,
        rgba(0,0,0,0.55) 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* --- OVERLAY CONTROLS (au-dessus de la vidéo) --- */
    .preview-top-controls {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding-top: max(16px, env(safe-area-inset-top));
      padding-right: 16px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      z-index: 10;
      pointer-events: auto;
    }

    /* Bouton mute son original (haut droit) */
    .original-mute-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(15,15,15,0.7);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .original-mute-btn:active { transform: scale(0.92); }
    .original-mute-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .original-mute-btn.muted { background: rgba(255,59,48,0.25); border-color: rgba(255,59,48,0.5); }
    .original-mute-btn.muted svg { fill: #ff3b30; }

    /* Bouton miniature (bas gauche, au-dessus de la sheet) */
    .thumbnail-btn-overlay {
      position: absolute;
      left: 16px;
      z-index: 10;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.2s ease;
    }
    .thumbnail-btn-overlay:active { transform: scale(0.92); }
    .thumbnail-btn-overlay canvas {
      width: 46px !important;
      height: 62px !important;
      min-width: 46px !important;
      max-width: 46px !important;
      min-height: 62px !important;
      max-height: 62px !important;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.55);
      display: block;
      background: rgba(255,255,255,0.08);
    }

    /* Bouton "Ajouter un son" (centré, au-dessus de la sheet) */
    .music-trigger-row {
      position: absolute;
      left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      pointer-events: auto;
    }

    .music-overlay {
      padding: 0 14px;
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(135deg, rgba(15,15,15,0.9), rgba(25,25,25,0.9));
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px; color: #fff; font-size: 13px;
      backdrop-filter: blur(14px);
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      height: 52px;
      max-width: 240px;
      pointer-events: auto;
    }
    .music-overlay.empty .music-clear { display: none; }
    .music-meta { display: flex; flex-direction: column; min-width: 0; }
    .music-title { font-weight: 800; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    .music-artist, .music-duration { display: none; }
    .music-visual { display: inline-flex; align-items: center; justify-content: center; gap: 10px; min-width: 0; }
    .music-overlay.empty .music-visual { width: auto; justify-content: center; }
    .music-overlay.empty .music-meta { flex: 1; min-width: 0; text-align: center; }
    .music-overlay.empty .music-title { max-width: none; }
    .music-icon { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; display: block; }
    .music-clear {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.08);
      color: #fff; display: grid; place-items: center; flex-shrink: 0;
      transition: all 0.2s;
    }
    .music-clear svg { width: 12px; height: 12px; }
    .music-clear:active { transform: scale(0.92); }

    /* --- PREVIEW ACTIONS (bas, toujours visible, même hauteur qu'avant) --- */
    #preview-actions {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: var(--preview-actions-height, 110px);
      min-height: var(--preview-actions-height, 110px);
      background: #000;
      display: flex; align-items: center; justify-content: center;
      gap: 15px;
      padding: 0 24px calc(env(safe-area-inset-bottom) + 10px);
      pointer-events: auto;
      z-index: 20;
    }
    .action-btn { flex: 1; height: 54px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; border-radius: 14px; }
    #restart-button { background: #1c1c1e; color: #fff; border: 1px solid #333; }
    #next-button { background: #fff; color: #000; }

    /* --- MUSIC SHEET (bottom sheet, s'ouvre sur tap) --- */
    #music-controls {
      position: absolute;
      left: 0; right: 0;
      bottom: var(--preview-actions-height, 110px);
      height: 75dvh; max-height: 75dvh;
      pointer-events: auto;
      z-index: 15;
    }

    /* --- THUMBNAIL SHEET --- */
    #thumbnail-sheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.97);
      border-top-left-radius: 26px; border-top-right-radius: 26px;
      z-index: 25;
      transform: translateY(100%);
      transition: transform 0.36s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      padding: 18px 20px calc(20px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 -18px 40px rgba(0,0,0,0.55);
    }
    #thumbnail-sheet.active { transform: translateY(0); pointer-events: auto; }
    .thumbnail-sheet-handle {
      width: 70px; height: 6px; border-radius: 10px;
      background: #2f2f2f; align-self: center; margin-bottom: 4px;
    }
    .thumbnail-sheet-title {
      font-size: 15px; font-weight: 700; color: #fff; text-align: center;
    }
    .thumbnail-preview-container {
      display: flex; justify-content: center;
    }
    .thumbnail-preview-inner {
      width: min(160px, 45vw);
      aspect-ratio: 9/16;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 12px 24px rgba(0,0,0,0.45);
    }
    #thumbnailCanvas { width: 100%; height: 100%; display: block; }
    .thumbnail-slider-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
    }
    .thumbnail-slider-label {
      font-size: 12px; color: rgba(255,255,255,0.65); flex: 0 0 auto;
    }
    .thumbnail-time-slider { flex: 1; min-width: 0; }
    .thumbnail-time-display {
      font-size: 12px; color: rgba(255,255,255,0.9);
      min-width: 36px; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .thumbnail-sheet-close {
      height: 50px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .thumbnail-sheet-close:active { transform: scale(0.97); }

    /* --- SHEET (musique) --- */
    .sheet-backdrop {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.65));
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease; z-index: 12;
    }
    .sheet-backdrop.active { opacity: 1; pointer-events: auto; }

    .sheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 20px 18px 0;
      display: flex; flex-direction: column; gap: 18px;
      background: rgba(10,10,10,0.96); color: #fff;
      border-top-left-radius: 26px; border-top-right-radius: 26px;
      transform: translateY(100%);
      transition: transform 0.36s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 80;
      box-shadow: 0 -18px 40px rgba(0,0,0,0.55);
      height: 80dvh; max-height: 80dvh;
      overflow: hidden; overflow-x: hidden;
      pointer-events: none;
      will-change: transform;
    }
    .sheet.active { transform: translateY(0); pointer-events: auto; }
    #music-filter-sheet { height: 30dvh; max-height: 30dvh; }
    .sheet .sheet-handle { width: 70px; height: 6px; border-radius: 10px; background: #2f2f2f; align-self: center; margin-bottom: 4px; }
    .sheet-content { display: flex; flex-direction: column; gap: 18px; flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 24px; }
    .sheet header { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .sheet .title { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; font-weight: 800; letter-spacing: 0.3px; text-align: center; }
    .sheet label { font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .sheet input[type="search"] { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid #2b2b2d; background: #131316; color: #fff; font-size: 14px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
    @supports (-webkit-touch-callout: none) { .sheet input[type="search"] { font-size: 16px; } }
    .sheet select, .sheet input[type="range"] { flex: 1; padding: 8px 10px; border-radius: 12px; border: 1px solid #2b2b2d; background: #151519; color: #fff; }
    .sheet .toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; background: rgba(255,255,255,0.04); padding: 12px; border-radius: 14px; border: 1px solid #1f1f24; }
    .music-search-row { display: flex; gap: 10px; align-items: center; }
    .music-search-row input[type="search"] { flex: 1 1 auto; min-width: 0; width: auto; }
    .music-filter-btn {
      height: 44px; min-width: 44px; padding: 0 12px;
      border-radius: 14px; border: 1px solid #2b2b2d;
      background: #151519; color: #fff;
      display: grid; place-items: center; cursor: pointer;
    }
    .music-filter-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .tag-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .tag-chip { border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #fff; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .tag-chip.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); }
    #music-list { flex: 1; min-height: 0; max-height: none; overflow: auto; display: flex; flex-direction: column; gap: 8px; margin: 6px 0 4px; }
    .music-item { padding: 12px 12px; border-radius: 14px; border: 1px solid #1f1f1f; background: linear-gradient(145deg, #121216, #0e0e10); display: flex; align-items: center; gap: 10px; cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
    .music-item.active { border-color: #fff; background: #1f1f1f; }
    .music-item .title { font-weight: 700; font-size: 14px; }
    .music-item .artist { font-size: 12px; color: #b5b5b5; }
    .music-list-cover { width: 50px; height: 50px; border-radius: 14px; background: rgba(255,255,255,0.08) center/cover no-repeat; border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); flex-shrink: 0; }
    .music-list-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; align-items: flex-start; text-align: left; }
    .music-list-duration { font-size: 12px; color: #dcdcdc; font-weight: 700; }
    .timeline-row { display: flex; flex-direction: column; gap: 8px; padding: 12px; border-radius: 16px; border: 1px solid #1d1d22; background: rgba(255,255,255,0.03); }
    .timeline-row .timeline-header { display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 13px; color: #e5e5e7; }
    .timeline-row .time-chip { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 6px 10px; font-size: 12px; letter-spacing: 0.2px; }
    .waveform-visual {
      height: 72px; border-radius: 14px; border: 1px solid #1f1f24;
      background: linear-gradient(145deg, #0f0f12, #121216);
      display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
      gap: 3px; padding: 10px 12px; align-items: end;
      cursor: pointer; overflow: hidden; position: relative;
    }
    .waveform-visual span {
      display: block; width: 6px; align-self: end; border-radius: 6px 6px 2px 2px;
      background: linear-gradient(180deg, #7f7ff5, #5ecbfa);
      opacity: 0.35; transition: opacity 0.2s, transform 0.2s, background 0.2s;
      height: var(--bar-height, 30%);
    }
    .waveform-visual span.active { opacity: 1; box-shadow: 0 6px 14px rgba(94,203,250,0.35); transform: translateY(-2px); background: linear-gradient(180deg, #9dd8ff, #6ccfff); }
    .waveform-handle {
      position: absolute; top: 6px; bottom: 6px; width: 2px;
      background: rgba(255,255,255,0.9); transform: translateX(-50%);
      display: flex; align-items: flex-end; justify-content: center; pointer-events: none;
    }
    .waveform-handle::after {
      content: ''; position: absolute; bottom: -6px; width: 12px; height: 12px;
      border-radius: 50%; background: #9dd8ff; box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      transform: translateY(50%);
    }
    .waveform-handle.end { background: rgba(255,255,255,0.65); }
    .waveform-handle.end::after { background: #6ccfff; }
    .slider-row { display: flex; align-items: center; gap: 10px; }

    /* Bouton icône générique */
    .icon-btn {
      border: 1px solid var(--glass-border); background: var(--glass-bg); color: #fff;
      border-radius: 12px; padding: 8px 10px; cursor: pointer;
      display: grid; place-items: center; transition: transform 0.2s ease;
      min-width: 40px; min-height: 36px;
    }
    .icon-btn svg { width: 20px; height: 20px; display: block; }
    .icon-btn.loading { position: relative; cursor: default; }
    .icon-btn.loading svg { opacity: 0; }
    .icon-btn.loading::after {
      content: ''; position: absolute; inset: 0; margin: auto;
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff; border-radius: 50%; box-sizing: border-box;
      animation: spin 0.8s linear infinite;
    }
    .icon-btn:active { transform: scale(0.95); }
    .icon-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* --- ONGLET SON — 2 sliders --- */
    .audio-tab-content { display: flex; flex-direction: column; gap: 14px; }
    .volume-section {
      display: flex; flex-direction: column; gap: 10px;
      padding: 14px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }
    .volume-section-label {
      font-size: 13px; font-weight: 700; color: #e5e5e7;
      display: flex; justify-content: space-between; align-items: center;
    }
    .volume-value-chip {
      padding: 4px 10px; border-radius: 10px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
      font-size: 12px; letter-spacing: 0.3px; min-width: 40px; text-align: center;
      color: #fff;
    }

    /* Slider style unifié */
    .vol-slider {
      --slider-hit-padding: 14px;
      -webkit-appearance: none; appearance: none;
      width: 100%; height: calc(8px + var(--slider-hit-padding) * 2);
      padding: var(--slider-hit-padding) 0;
      background: transparent; border-radius: 999px; outline: none; border: none;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      margin-top: calc((8px - 18px) / 2);
    }
    .vol-slider::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }
    .vol-slider::-moz-range-track {
      height: 8px; border-radius: 999px; background: rgba(255,255,255,0.16);
      border: none; box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .vol-slider::-webkit-slider-runnable-track {
      height: 8px; border-radius: 999px; background: rgba(255,255,255,0.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .tab-bar {
      display: flex; gap: 10px; background: rgba(20,20,20,0.9);
      border: 1px solid rgba(255,255,255,0.12); padding: 6px 10px;
      border-radius: 16px; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .tab-btn {
      flex: 1; height: 46px; border-radius: 12px; border: 1px solid transparent;
      background: transparent; color: rgba(255,255,255,0.7); cursor: pointer;
      transition: all 0.2s ease; display: grid; place-items: center;
    }
    .tab-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .tab-btn.active { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.35); box-shadow: 0 10px 20px rgba(0,0,0,0.35); }
    .tab-btn .tab-label { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    .tab-panel { display: none; flex-direction: column; gap: 14px; }
    .tab-panel.active { display: flex; }
    .sheet header .title svg { width: 18px; height: 18px; fill: currentColor; }

    /* --- UPLOAD --- */
    #upload-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.2s; }
    #upload-overlay.active { opacity: 1; visibility: visible; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #upload-text { display: flex; flex-direction: column; }
    #upload-progress-text, #upload-mix-text { color: #fff; font-weight: 600; text-align: center; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s ease; }
    #upload-progress-text { font-size: 18px; order: 2; margin-top: 20px; }
    #upload-mix-text { font-size: 16px; line-height: 1.4; max-width: 320px; white-space: pre-line; opacity: 0; order: 0; margin-bottom: 20px; }
    #upload-text.show-mixing #upload-progress-text { opacity: 0; }
    #upload-text.show-mixing #upload-mix-text { opacity: 1; }
    #upload-overlay .spinner { order: 1; }

    /* --- ERROR TOAST --- */
    #error-toast {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: rgba(255, 59, 48, 0.9); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 12px 24px; border-radius: 30px;
      font-weight: 600; font-size: 14px; z-index: 200;
      opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none; text-align: center; width: 90%; max-width: 300px;
    }
    #error-toast.active { opacity: 1; transform: translateX(-50%) translateY(0); }

    #recording-timer {
      position: fixed; top: calc(env(safe-area-inset-top) + 6px); left: 50%;
      transform: translateX(-50%); z-index: 45; padding: 8px 14px; border-radius: 20px;
      background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
      opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
    }
    body.recording #recording-timer { opacity: 1; }

    input[type="file"] { display: none; }
    body.showing-preview .controls { display: none !important; }
    .visually-hidden { position: absolute !important; height: 1px; width: 1px; overflow: hidden; clip: rect(1px, 1px, 1px, 1px); white-space: nowrap; }
  </style>
</head>
<body>

  <div id="countdown-display"></div>
  <div id="error-toast">Erreur</div>
  <div id="recording-timer">0:00</div>

  <div id="camera-container">
    <video id="camera-preview" playsinline muted autoplay></video>
    <div class="controls">

        </button>
        <button type="button" class="btn" id="timer-btn">

          </button>
        </div>
        <div class="record-wrap" id="record-wrap-btn">

        <div class="side">
          <button type="button" class="btn" id="switch-btn">
            <svg viewBox="0 0 24 24"><path d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"></path></svg>
          </button>

      </div>

  </div>

  <!-- ===================== PREVIEW OVERLAY ===================== -->
  <div id="preview-overlay">

    <!-- Vidéo plein écran -->
    <video id="preview-video" playsinline webkit-playsinline preload="auto" loop></video>

    <!-- Gradient de lisibilité -->

    <!-- Haut droit : bouton mute son original -->
    <div class="preview-top-controls">
      <button type="button" class="original-mute-btn" id="original-mute-btn" aria-label="Couper le son original">
        <!-- Icône micro actif (son ON) -->
        <svg id="mic-icon-on" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <!-- Icône micro barré (son OFF) -->
        <svg id="mic-icon-off" viewBox="0 0 24 24" aria-hidden="true" style="display:none;">
          <path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/>
        </svg>
      </button>
    </div>

    <!-- Bouton miniature (bas gauche, positionné dynamiquement par JS) -->
    <div class="thumbnail-btn-overlay" id="thumbnail-btn-overlay" aria-label="Choisir la miniature">
      <canvas id="thumbnailCanvas"></canvas>
    </div>

    <!-- Bouton "Ajouter un son" (centré, positionné dynamiquement par JS) -->
    <div class="music-trigger-row" id="music-trigger-row">
      <div id="music-overlay" class="music-overlay empty">
        <div class="music-visual">
          <svg class="music-icon" viewBox="0 0 256 256" aria-hidden="true"><path d="M211.79 35.48a8 8 0 0 0-6.62-1.43l-96 20a8 8 0 0 0-6.54 7.86V168a28 28 0 1 0 16 25.45V121.89l80-16.67V152a28 28 0 1 0 16 25.45V43.91a8 8 0 0 0-3.38-6.63ZM88 216a12 12 0 1 1 12-12 12 12 0 0 1-12 12Zm28-106.67V79.12l80-16.67v30.22Zm80 106.67a12 12 0 1 1 12-12 12 12 0 0 1-12 12Z"></path></svg>
        </div>
        <div class="music-meta">
          <span class="music-title">Ajouter un son</span>

        <button type="button" id="music-clear-btn" class="music-clear" aria-label="Supprimer la musique">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M3.5 3.5l9 9m0-9l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Sheet musique -->
    <div id="music-controls" class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-content">
        <div class="tab-bar" id="music-tab-bar">
          <button type="button" class="tab-btn active" id="tab-btn-music" aria-label="Musique">
            <svg viewBox="0 0 256 256" aria-hidden="true"><path d="M211.79 35.48a8 8 0 0 0-6.62-1.43l-96 20a8 8 0 0 0-6.54 7.86V168a28 28 0 1 0 16 25.45V121.89l80-16.67V152a28 28 0 1 0 16 25.45V43.91a8 8 0 0 0-3.38-6.63ZM88 216a12 12 0 1 1 12-12 12 12 0 0 1-12 12Zm28-106.67V79.12l80-16.67v30.22Zm80 106.67a12 12 0 1 1 12-12 12 12 0 0 1-12 12Z"></path></svg>
            <span class="tab-label">Musique</span>
          </button>
          <button type="button" class="tab-btn" id="tab-btn-waveform" aria-label="Waveform">
            <svg viewBox="0 0 256 256" aria-hidden="true"><path d="M56 64a8 8 0 0 1 8 8v112a8 8 0 0 1-16 0V72a8 8 0 0 1 8-8Zm36 24a8 8 0 0 1 8 8v64a8 8 0 0 1-16 0V96a8 8 0 0 1 8-8Zm36-40a8 8 0 0 1 8 8v144a8 8 0 0 1-16 0V56a8 8 0 0 1 8-8Zm36 32a8 8 0 0 1 8 8v96a8 8 0 0 1-16 0V88a8 8 0 0 1 8-8Zm36-24a8 8 0 0 1 8 8v144a8 8 0 0 1-16 0V64a8 8 0 0 1 8-8Z"></path></svg>
            <span class="tab-label">Waveform</span>
          </button>
          <button type="button" class="tab-btn" id="tab-btn-audio" aria-label="Son">
            <svg viewBox="0 0 256 256" aria-hidden="true"><path d="M32 96v64a16 16 0 0 0 16 16h32l48 48a8 8 0 0 0 13.66-5.66V37.66A8 8 0 0 0 128 32L80 80H48a16 16 0 0 0-16 16Zm136 8a8 8 0 0 1 8 8v32a8 8 0 0 1-16 0v-32a8 8 0 0 1 8-8Zm32-24a8 8 0 0 1 8 8v80a8 8 0 0 1-16 0V88a8 8 0 0 1 8-8Z"></path></svg>
            <span class="tab-label">Son</span>
          </button>
        </div>

        <!-- Onglet Musique -->
        <div id="tab-music" class="tab-panel active">
          <div class="music-search-row">
            <input id="music-search" type="search" placeholder="Rechercher un titre ou un artiste" />
            <button type="button" id="music-filter-btn" class="music-filter-btn" aria-label="Filtre">
              <svg viewBox="0 0 256 256" aria-hidden="true"><path d="M40 64a8 8 0 0 1 8-8h160a8 8 0 0 1 0 16h-24v112a8 8 0 0 1-8 8h-40a8 8 0 0 1-8-8V72h-24v64a8 8 0 0 1-8 8H56a8 8 0 0 1-8-8V72h-0a8 8 0 0 1-8-8Zm24 8v56h24V72Zm80 0v104h24V72Z"></path></svg>
            </button>
          </div>
          <div id="music-list" class="music-list"></div>
        </div>

        <!-- Onglet Waveform -->
        <div id="tab-waveform" class="tab-panel">
          <div class="timeline-row">
            <div class="timeline-header">
              <span>Choisir le passage</span>
              <div class="time-actions">
                <span class="time-chip" id="music-position-label">0:00 – 0:00 / 0:00</span>
              </div>

            <div id="waveform-visual" class="waveform-visual" role="presentation"></div>

        </div>

        <!-- Onglet Son — 2 sliders -->
        <div id="tab-audio" class="tab-panel">
          <div class="audio-tab-content">
            <!-- Slider son original -->
            <div class="volume-section">
              <div class="volume-section-label">
                <span>Son original</span>
                <span class="volume-value-chip" id="original-volume-value">100</span>

            <!-- Slider musique -->
            <div class="volume-section">
              <div class="volume-section-label">
                <span>Volume musique</span>
                <span class="volume-value-chip" id="music-volume-value">50</span>
              </div>
              <input id="music-volume" class="vol-slider" type="range" min="0" max="1" step="0.01" value="0.5" />
            </div>

        </div>
      </div>
    </div>

    <!-- Actions bas d'écran (toujours visibles) -->
    <div id="preview-actions">
      <button type="button" id="restart-button" class="action-btn">Recommencer</button>
      <button type="button" id="next-button" class="action-btn">Suivant</button>
    </div>

    <!-- Sheet backdrop (pour sheets musique et filtre) -->
    <div id="sheet-backdrop" class="sheet-backdrop"></div>

    <!-- Sheet filtre musique -->
    <div id="music-filter-sheet" class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-content">
        <header>
          <div class="title">
            <svg viewBox="0 0 256 256" aria-hidden="true"><path d="M40 64a8 8 0 0 1 8-8h160a8 8 0 0 1 0 16h-24v112a8 8 0 0 1-8 8h-40a8 8 0 0 1-8-8V72h-24v64a8 8 0 0 1-8 8H56a8 8 0 0 1-8-8V72h0a8 8 0 0 1-8-8Zm24 8v56h24V72Zm80 0v104h24V72Z"></path></svg>
            <span>Filtres</span>
          </div>
        </header>
        <div id="music-filter-tags" class="tag-grid"></div>
      </div>
    </div>

    <!-- Sheet miniature -->
    <div id="thumbnail-sheet">
      <div class="thumbnail-sheet-handle"></div>
      <div class="thumbnail-sheet-title">Choisir la miniature</div>
      <div class="thumbnail-preview-container">

          <canvas id="thumbnailCanvasSheet"></canvas>
        </div>
      </div>

  <!-- ===================== FIN PREVIEW OVERLAY ===================== -->

  <div id="upload-overlay">
    <div class="spinner"></div>
    <div id="upload-text">
      <span id="upload-mix-text"></span>
      <span id="upload-progress-text">Préparation...</span>
    </div>
  </div>
  <input type="file" id="camera-input" accept="video/*" capture="environment" />
  <input type="file" id="galleryInput" accept="video/*" />

  <script>
    const cameraPreview = document.getElementById('camera-preview');
    const previewVideo = document.getElementById('preview-video');
    const previewOverlay = document.getElementById('preview-overlay');
    const recordWrapBtn = document.getElementById('record-wrap-btn');
    const flashBtn = document.getElementById('flash-btn');
    const flashIconPath = document.getElementById('flash-icon-path');
    const switchBtn = document.getElementById('switch-btn');
    const timerBtn = document.getElementById('timer-btn');
    const timerText = document.getElementById('timer-text');
    const countdownDisplay = document.getElementById('countdown-display');
    const galleryBtn = document.getElementById('gallery-btn');
    const restartBtn = document.getElementById('restart-button');
    const nextBtn = document.getElementById('next-button');
    const cameraInput = document.getElementById('camera-input');
    const galleryInput = document.getElementById('galleryInput');
    const uploadOverlay = document.getElementById('upload-overlay');
    const uploadText = document.getElementById('upload-text');
    const uploadProgressText = document.getElementById('upload-progress-text');
    const uploadMixText = document.getElementById('upload-mix-text');
    const progressCircle = document.getElementById('record-progress-circle');
    const errorToast = document.getElementById('error-toast');
    const recordingTimer = document.getElementById('recording-timer');
    const musicOverlay = document.getElementById('music-overlay');
    const musicOverlayTitle = musicOverlay.querySelector('.music-title');
    const musicOverlayArtist = musicOverlay.querySelector('.music-artist');
    const musicOverlayDuration = document.getElementById('music-duration');
    const musicClearBtn = document.getElementById('music-clear-btn');
    const musicSearchInput = document.getElementById('music-search');
    const musicListEl = document.getElementById('music-list');
    const musicVolumeInput = document.getElementById('music-volume');
    const musicVolumeValue = document.getElementById('music-volume-value');
    const musicPositionLabel = document.getElementById('music-position-label');
    const musicSheet = document.getElementById('music-controls');
    const musicFilterSheet = document.getElementById('music-filter-sheet');
    const musicFilterBtn = document.getElementById('music-filter-btn');
    const musicFilterTags = document.getElementById('music-filter-tags');
    const sheetBackdrop = document.getElementById('sheet-backdrop');
    const waveformVisual = document.getElementById('waveform-visual');
    const thumbnailCanvas = document.getElementById('thumbnailCanvas');
    const thumbnailCtx = thumbnailCanvas?.getContext('2d', { alpha: false });
    const thumbnailCanvasSheet = document.getElementById('thumbnailCanvasSheet');
    const thumbnailCtxSheet = thumbnailCanvasSheet?.getContext('2d', { alpha: false });
    const thumbnailTimeSlider = document.getElementById('thumbnail-time-slider');
    const thumbnailTimeDisplay = document.getElementById('thumbnail-time-display');
    const thumbnailBtnOverlay = document.getElementById('thumbnail-btn-overlay');
    const thumbnailSheet = document.getElementById('thumbnail-sheet');
    const thumbnailSheetClose = document.getElementById('thumbnail-sheet-close');
    const originalMuteBtn = document.getElementById('original-mute-btn');
    const micIconOn = document.getElementById('mic-icon-on');
    const micIconOff = document.getElementById('mic-icon-off');
    const originalVolumeSlider = document.getElementById('original-volume-slider');
    const originalVolumeValue = document.getElementById('original-volume-value');
    const musicTriggerRow = document.getElementById('music-trigger-row');
    const previewActions = document.getElementById('preview-actions');

    let waveformHandleStart = null;
    let waveformHandleEnd = null;
    const tabWaveform = document.getElementById('tab-waveform');
    const tabMusicTab = document.getElementById('tab-music');
    const tabAudio = document.getElementById('tab-audio');
    const tabBtnMusic = document.getElementById('tab-btn-music');
    const tabBtnWaveform = document.getElementById('tab-btn-waveform');
    const tabBtnAudio = document.getElementById('tab-btn-audio');
    const musicTabBar = document.getElementById('music-tab-bar');

    let currentlyPlayingMusicId = null;
    let pendingMusicId = null;
    let videoSourceType = null;
    let isDraggingWaveform = false;
    let videoDurationSeconds = 0;
    const isGalleryVideoSource = () => videoSourceType === 'gallery';
    const isWebviewCameraSource = () => videoSourceType === 'webview-camera';

    // Volume son original (0→1, défaut 1 = 100%)
    let originalVolume = 1;

    const revealCameraPreview = () => { cameraPreview.style.opacity = "1"; };
    const ensureCameraVisible = () => {
      revealCameraPreview();
      requestAnimationFrame(revealCameraPreview);
      setTimeout(revealCameraPreview, 200);
    };
    const markCameraReady = () => {
      ensureCameraVisible();
      if (cameraReady) return;
      cameraReady = true;
      document.body.classList.remove('camera-starting');
      if (pendingRecordUI && isRecording) {
        document.body.classList.add('recording');
        pendingRecordUI = false;
      }
      scheduleSafeMusicPreload();
    };
    cameraPreview.addEventListener('loadeddata', markCameraReady);

    let mediaStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let recordedBlob = null;
    let previewObjectURL = null;
    let selectedThumbnailTime = 0.5;
    let thumbnailPrepareTimeout = null;
    let thumbnailDrawRaf = null;
    let cameraReady = false;
    let pendingRecordUI = false;

    // --- MUSIQUE ---
    const DEFAULT_MUSIC_OPTIONS = [
      { id: 'default', title: 'Default music', artist: 'Feednly', url: 'https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3' }
    ];
    const sanitizeMusicOptions = (list = []) => {
      if (!Array.isArray(list)) return [...DEFAULT_MUSIC_OPTIONS];
      const cleaned = list.filter(item => item && typeof item.url === 'string' && item.url.trim().length > 0);
      return cleaned.length ? cleaned : [...DEFAULT_MUSIC_OPTIONS];
    };
    let musicOptions = sanitizeMusicOptions(DEFAULT_MUSIC_OPTIONS);
    let musicVolume = 0.5;
    let musicStartTime = 0;
    let selectedMusicId = null;
    let currentMusicDuration = 30;
    const DEFAULT_TAG_LABEL = 'Aucun';
    const DEFAULT_TAG_VALUE = 'aucun';
    let activeTag = DEFAULT_TAG_VALUE;
    let isOriginalMuted = false;
    let musicSessionId = 0;
    const WAVEFORM_BAR_COUNT = 32;
    const TAG_OPTIONS = [DEFAULT_TAG_LABEL, 'Chill', 'Rap', 'Pop', 'Electro', 'Cinematic', 'Rock'];

    function invalidateMusicSession() { musicSessionId += 1; return musicSessionId; }

    function createCacheEntry({ id, url } = {}) {
      const entry = { buffer: null, promise: null, url: url || '', duration: null, lastUsedAt: 0, ids: new Set(), keys: new Set() };
      if (id !== undefined && id !== null) entry.ids.add(String(id));
      if (url) entry.ids.add(String(url));
      return entry;
    }
    function registerCacheKey(entry, key) {
      if (!entry || key === undefined || key === null || key === '') return;
      entry.keys.add(key); entry.ids.add(String(key)); audioPreloadCache.set(key, entry);

      applyOriginalVolume(originalVolume);

      if (isWebviewCameraSource()) preloadInitialPreviewTracks();
      if (shouldPreloadAfterGallery && isWebviewCameraSource()) { shouldPreloadAfterGallery = false; preloadVisibleMusicImmediately(); }
      scheduleThumbnailPreparation();
      // Positionner les overlays
      requestAnimationFrame(positionPreviewOverlays);
    }

    function resetPreviewState() {
      if (previewTimeout) { clearTimeout(previewTimeout); previewTimeout = null; }
      stopMusicPreview({ hard: true }); invalidateMusicSession(); resetThumbnailDefaults();
      previewVideo.src = '';
      if (previewObjectURL) { URL.revokeObjectURL(previewObjectURL); previewObjectURL = null; }
      recordedBlob = null; videoSourceType = null; videoDurationSeconds = 0;
      lastVideoTime = 0;
    }
    function hidePreview() {
      previewOverlay.classList.remove('active'); document.body.classList.remove('showing-preview');
      shouldResetMusicSheetOnOpen = true; resetMusicSheetUI(); unlockPreviewViewport();
      // Fermer la sheet miniature si ouverte
      thumbnailSheet?.classList.remove('active');
      resetPreviewState();
      if (!uploadCompleted && (!mediaStream || !mediaStream.active)) startCamera();
    }

    syncAppViewportVars();
    let viewportSyncRaf = null;
    function scheduleViewportSync() { if (viewportSyncRaf) return; viewportSyncRaf = requestAnimationFrame(() => { viewportSyncRaf = null; syncAppViewportVars(); positionPreviewOverlays(); }); }
    window.addEventListener('resize', scheduleViewportSync, { passive: true });
    window.addEventListener('orientationchange', scheduleViewportSync, { passive: true });
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', scheduleViewportSync, { passive: true });
      window.visualViewport.addEventListener('scroll', scheduleViewportSync, { passive: true });
    }

    previewVideo.onloadedmetadata = () => {
      videoDurationSeconds = Math.max(0, Number(previewVideo.duration) || 0);
      if (shouldCheckDuration) {
        if (previewVideo.duration > 61) { showError('La vidéo doit faire moins de 1 minute'); setTimeout(() => hidePreview(), 1200); shouldCheckDuration = false; return; }
        shouldCheckDuration = false;
      }
      updateThumbnailSliderBounds(); resizeThumbnailCanvases();
      const defaultTime = Math.min(videoDurationSeconds || DEFAULT_THUMBNAIL_TIME, DEFAULT_THUMBNAIL_TIME);
      selectedThumbnailTime = defaultTime;
      previewVideo.currentTime = defaultTime;
      requestDrawThumbnail();
      if (thumbnailTimeSlider) thumbnailTimeSlider.value = String(defaultTime);
      updateThumbnailTimeLabel(defaultTime);
      const selectedMusic = getSelectedMusic();
      if (!isGalleryVideoSource() && selectedMusic) updateSeekDurationFromMeta(selectedMusic);
      else if (!isGalleryVideoSource()) setSeekLimits(currentMusicDuration);
      updateMusicOverlay();
      // Lancer la vidéo automatiquement
      previewVideo.play().catch(() => {});
      if (!isGalleryVideoSource()) restartPreviewIfPlaying();
    };

    flashBtn.onclick = toggleFlash;
    switchBtn.onclick = () => {
      if (isRecording || isCountingDown || isSwitching) return; isSwitching = true;
      switchBtn.style.transform = "rotate(180deg)";
      if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      facingMode = (facingMode === 'environment') ? 'user' : 'environment';
      startCamera().then(() => { setTimeout(() => switchBtn.style.transform = "rotate(0deg)", 300); isSwitching = false; }).catch(() => { isSwitching = false; });
    };

    galleryBtn.onclick = () => {
      stopMusicPreview({ hard: true });
      if (previewTimeout) { clearTimeout(previewTimeout); previewTimeout = null; }
      recordedBlob = null; shouldCheckDuration = false;
      previewVideo.src = '';
      if (previewObjectURL) { URL.revokeObjectURL(previewObjectURL); previewObjectURL = null; }
      hidePreview();
      if (mediaStream) mediaStream.getAudioTracks().forEach(track => track.stop());
      galleryInput.value = ''; galleryInput.click();
    };

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) { startCamera(); return; }
      videoSourceType = 'gallery'; recordedBlob = file;
      shouldCheckDuration = true; shouldPreloadAfterGallery = true;
      showPreview(file); e.target.value = '';
    }
    galleryInput.onchange = handleFileSelect;
    if (cameraInput) cameraInput.onchange = handleFileSelect;

    restartBtn.onclick = () => { hidePreview(); };

    nextBtn.onclick = async () => {
      stopMusicPreview({ hard: true });
      let uploadPhaseTimeout = null, uploadSuccessNotified = false, processingStarted = false;
      const selectedThumbnailTimeForUpload = Number.isFinite(selectedThumbnailTime) ? selectedThumbnailTime : DEFAULT_THUMBNAIL_TIME;

      function resetAfterUploadSuccess() {
        if (uploadPhaseTimeout) { clearTimeout(uploadPhaseTimeout); uploadPhaseTimeout = null; }
        stopUploadProgressAnimation(); stopProcessingProgressAnimation(); uploadCompleted = true; hidePreview();
        recordedChunks = []; pendingRecordUI = false;
        if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
      }
      function fail(step, detail = '', { includeMusicDebug = true } = {}) {
        stopUploadProgressAnimation(); stopProcessingProgressAnimation();
        if (uploadPhaseTimeout) { clearTimeout(uploadPhaseTimeout); uploadPhaseTimeout = null; }
        setUploadStatusText(`Échec (${step})${detail ? ' : ' + detail : ''}`);
        setTimeout(() => uploadOverlay.classList.remove('active'), 4000);
      }
      async function handleUploadSuccess(assetId) {
        if (!assetId || uploadSuccessNotified) return; uploadSuccessNotified = true;
        stopProcessingProgressAnimation(); setUploadProgress(99); showUploadFinalizationMessage();
        notifyHost({ status: 'success', action: 'next_page', asset_id: assetId, selected_thumbnail_time: selectedThumbnailTimeForUpload, thumbnail_time: selectedThumbnailTimeForUpload });
        resetAfterUploadSuccess();
      }

      const muxUploadUrl = getUploadURL();
      uploadOverlay.classList.add('active'); setUploadProgress(0); uploadHasMusic = false;
      const uploadBlob = recordedBlob;
      if (!(uploadBlob instanceof Blob) || uploadBlob.size === 0) { fail('no-video'); return; }
      if (!muxUploadUrl) { fail('no-mux-upload-url'); return; }

      if (videoSourceType === 'gallery') {
        uploadOverlay.classList.add('active');
        try {
          await uploadBlobToMuxWithProgress(muxUploadUrl, uploadBlob, { contentType: uploadBlob.type || 'video/mp4' });
          const assetId = buildAssetId(muxUploadUrl); if (!assetId) throw new Error('invalid mux upload url');
          await handleUploadSuccess(assetId); return;
        } catch (error) { fail('direct-mux-upload', error?.message || 'unknown', { includeMusicDebug: false }); return; }
      }

      const selectedMusic = getSelectedMusic();
      const hasSelectedMusic = Boolean(selectedMusic && selectedMusic.url);
      uploadHasMusic = hasSelectedMusic;
      // Pour l'upload, on utilise originalVolume au lieu de isOriginalMuted
      const audioMode = (() => {
        const hasMusic = hasSelectedMusic;
        if (!hasMusic && originalVolume > 0) return 'original';
        if (!hasMusic && originalVolume === 0) return 'mute';
        if (hasMusic && originalVolume === 0) return 'music';
        return 'music+original';
      })();

      const isFastPath = recordedFacingMode === 'environment' && audioMode === 'original' && !hasSelectedMusic && originalVolume > 0;

      const startServerUpload = () => {
        const formData = new FormData();
        formData.append('video', uploadBlob, 'recording.mp4');
        formData.append('facingMode', recordedFacingMode);
        formData.append('audioMode', audioMode);
        formData.append('muxUploadUrl', muxUploadUrl);
        formData.append('thumbnailTime', String(selectedThumbnailTimeForUpload));
        if (hasSelectedMusic) {
          formData.append('musicUrl', selectedMusic.url || '');
          formData.append('musicStart', String(musicStartTime || 0));
          formData.append('musicVolume', String(musicVolume || 0));
        }
        // Passer le volume son original au serveur
        formData.append('originalVolume', String(originalVolume || 1));

        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://feednly-video-audio-v2-506631399204.europe-west1.run.app/process-upload', true);
        xhr.upload.onprogress = e => {
          if (!e.lengthComputable) return;
          const percent = Math.round((e.loaded / e.total) * 70);
          if (percent < 70) { setUploadProgress(percent); return; }
          setUploadProgress(70);
          if (!processingStarted) { processingStarted = true; startProcessingProgress({ target: 99, durationMs: 14000 }); }
        };
        xhr.onload = async () => {
          if (xhr.status < 300) {
            if (uploadPhaseTimeout) { clearTimeout(uploadPhaseTimeout); uploadPhaseTimeout = null; }
            stopUploadProgressAnimation();
            let res = {}, assetId = '';
            try { res = JSON.parse(xhr.responseText || '{}'); assetId = res.asset_id || ''; } catch (error) { fail('json-parse'); return; }
            if (!assetId) { fail('invalid-response', JSON.stringify(res)); return; }
            await handleUploadSuccess(assetId);
          } else { fail('http-error', 'status ' + xhr.status + ' – ' + xhr.responseText.slice(0, 200)); }
        };
        xhr.onerror = () => fail('network-error');
        xhr.send(formData);
      };

      const uploadDirectToMuxFastPath = async () => {
        startEstimatedUploadProgress(uploadBlob.size || 0);
        const uploadRes = await fetch(muxUploadUrl, { method: 'PUT', headers: { 'Content-Type': 'video/mp4' }, body: uploadBlob, duplex: 'half' });
        stopUploadProgressAnimation();
        if (!uploadRes.ok) throw new Error(`Mux upload failed: ${uploadRes.status}`);
        startProcessingProgress({ target: 99, durationMs: 4000 });
        const assetId = buildAssetId(muxUploadUrl); if (!assetId) throw new Error('invalid mux upload url');
        return assetId;
      };

      if (isFastPath) {
        try { const assetId = await uploadDirectToMuxFastPath(); if (uploadPhaseTimeout) { clearTimeout(uploadPhaseTimeout); uploadPhaseTimeout = null; } await handleUploadSuccess(assetId); return; }
        catch (error) { stopUploadProgressAnimation(); setUploadProgress(0); }
      }
      startServerUpload();
    };

    previewOverlay.onclick = async (e) => {
      const tappedAction = e.target.closest('.action-btn') || e.target.closest('#preview-actions');
      const tappedSheet = e.target.closest('.sheet') || e.target.closest('#thumbnail-sheet');
      if (musicFilterSheet.classList.contains('active') && !tappedSheet) { closeFilterSheet(); return; }
      if (!tappedAction) return;
    };

    setTimeout(() => { window.ReactNativeWebView?.postMessage("test-message"); }, 3000);
    startCamera();
  </script>
</body>
</html>

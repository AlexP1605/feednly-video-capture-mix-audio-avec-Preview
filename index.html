<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Camera Pro</title>
  <style>
    :root {
      --glass-bg: rgba(20, 20, 20, 0.65);
      --glass-border: rgba(255, 255, 255, 0.2);
      --primary: #ff3b30;
      --active-timer: #ffcc00;
      --flash-active: #ffcc00;
      --preview-actions-height: 86px;
      --app-viewport-height: 100svh;
      --app-viewport-width: 100vw;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    input, textarea, select {
      user-select: auto;
      -webkit-user-select: auto;
      -webkit-touch-callout: default;
    }

    html { width: 100%; height: 100%; background: #000; overflow: hidden; overflow-x: hidden; }

    body {
      margin: 0; width: 100%; height: var(--app-viewport-height, 100svh);
      min-height: var(--app-viewport-height, 100svh);
      max-height: var(--app-viewport-height, 100svh);
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden; overflow-x: hidden;
    }

    body.camera-starting * { transition: none !important; animation: none !important; }
    .bottom-bar { will-change: auto; }
    .record-wrap { flex-shrink: 0; }

    /* --- CAMERA --- */
    #camera-container { position: absolute; inset: 0; z-index: 1; background: #000; }
    #camera-preview { opacity: 0; transition: none; will-change: opacity, transform; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
    video::-webkit-media-controls { display: none !important; }

    /* --- FILTER CANVAS WebGL --- */
    #filter-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      visibility: hidden;
      object-fit: cover;
    }

    /* --- BARRE DE FILTRES --- */
    #filter-bar-container {
      position: absolute;
      left: 0; right: 0;
      z-index: 21;
      padding: 0 0 10px 0;
      pointer-events: auto;
    }
    #filter-bar {
      display: flex;
      gap: 12px;
      padding: 8px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-thumb {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.35);
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .filter-thumb.selected {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.45);
    }
    .filter-thumb-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
    }
    .filter-thumb-icon {
      font-size: 22px;
      line-height: 1;
    }
    .filter-label {
      font-size: 10px;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
      white-space: nowrap;
      text-align: center;
      letter-spacing: 0.1px;
    }
    .filter-label.selected {
      color: #fff;
      font-weight: 700;
    }

    /* --- COUNTDOWN --- */
    #countdown-display {
      position: fixed; inset: 0; z-index: 40;
      display: flex; align-items: center; justify-content: center;
      font-size: 180px; font-weight: 800; color: #fff;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 0; transform: scale(0.5);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #countdown-display.active { opacity: 1; transform: scale(1); }

    /* --- CONTROLS --- */
    .controls { position: absolute; inset: 0; z-index: 20; pointer-events: none; }
    .top-bar {
      position: absolute; top: 0; width: 100%;
      padding-top: max(20px, env(safe-area-inset-top));
      height: 80px;
      display: flex; justify-content: center; align-items: center;
      pointer-events: auto;
    }
    .bottom-bar {
      position: absolute; bottom: 0; width: 100%;
      padding: 0 30px calc(20px + env(safe-area-inset-bottom)) 30px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 30;
      min-height: 130px;
      contain: layout style;
    }
    body.recording .top-bar, body.recording .bottom-bar .side { opacity: 0; pointer-events: none; }
    body.recording #filter-bar-container { opacity: 0; pointer-events: none; }
    .side { pointer-events: auto; }
    .btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(10px);
      color: #fff; font-weight: 600; font-size: 14px;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.9); }
    body.camera-starting .btn:active { transform: none !important; }
    .btn.flash-on { border-color: var(--flash-active); }
    .btn.flash-on svg { fill: var(--flash-active); }
    #timer-btn { position: absolute; right: 20px; width: auto; padding: 0 14px; border-radius: 24px; gap: 6px; }
    #timer-btn.active { background: rgba(255, 204, 0, 0.3); border-color: var(--active-timer); color: var(--active-timer); }
    #timer-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .btn.disabled { opacity: 0.5; }
    .btn svg { width: 24px; height: 24px; fill: white; transition: fill 0.2s; }

    /* --- RECORD BUTTON --- */
    .record-wrap {
      position: relative; width: 90px; height: 90px;
      min-width: 90px; min-height: 90px; max-width: 90px; max-height: 90px;
      flex: 0 0 90px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .record-progress {
      position: absolute; inset: -3px; width: 96px; height: 96px;
      min-width: 96px; min-height: 96px; max-width: 96px; max-height: 96px;
      flex: 0 0 96px; display: block; transform: rotate(-90deg); pointer-events: none;
    }
    .record-progress circle { fill: none; stroke: var(--primary); stroke-width: 5px; stroke-linecap: round; stroke-dasharray: 0 999; transition: stroke-dashoffset 0.1s linear; }
    .record-button {
      width: 72px; height: 72px; min-width: 72px; min-height: 72px;
      max-width: 72px; max-height: 72px; border-radius: 50%; background: #fff;
      border: 4px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s; pointer-events: none;
    }
    body.recording .record-button { background: var(--primary); border-color: rgba(255,255,255,0.6); animation: pulse 1.5s infinite; }
    body.recording .record-inner { width: 35%; height: 35%; background: #fff; border-radius: 6px; }
    .record-inner { width: 100%; height: 100%; border-radius: 50%; transition: all 0.2s; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
    body.camera-starting .record-button { animation: none !important; box-shadow: none !important; }

    /* --- TAP TO PLAY OVERLAY --- */
    #tap-to-play {
      position: absolute; inset: 0; z-index: 60;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: transparent; cursor: pointer; pointer-events: none;
    }
    #tap-to-play.active { display: flex; pointer-events: auto; }
    #tap-to-play.paused { display: flex; pointer-events: auto; background: rgba(0,0,0,0.3); }
    .tap-to-play-btn {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(0,0,0,0.45); border: 2px solid rgba(255,255,255,0.7);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px; backdrop-filter: blur(8px);
      transition: transform 0.15s ease;
    }
    #tap-to-play:active .tap-to-play-btn { transform: scale(0.9); }
    .tap-to-play-btn svg { width: 32px; height: 32px; fill: #fff; }
    .tap-to-play-icon-play { margin-left: 4px; }
    .tap-to-play-icon-pause { display: none; }
    #tap-to-play.paused .tap-to-play-icon-play { display: none; }
    #tap-to-play.paused .tap-to-play-icon-pause { display: block; }
    .tap-to-play-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); letter-spacing: 0.2px; }

    /* =====================================================
       PREVIEW OVERLAY
       ===================================================== */
    #preview-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: #000; display: none; opacity: 0;
      transition: opacity 0.2s ease;
      width: var(--preview-viewport-width, var(--app-viewport-width, 100vw));
      height: var(--preview-viewport-height, var(--app-viewport-height, 100svh));
      overflow: hidden; contain: strict; isolation: isolate;
    }
    #preview-overlay.active { display: block; opacity: 1; }

    #preview-video {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; display: none; pointer-events: none;
      background: #000; will-change: transform; transform: translateZ(0);
    }

    .preview-scrim {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, transparent 25%, transparent 55%, rgba(0,0,0,0.55) 100%);
      pointer-events: none; z-index: 1;
    }

    .preview-top-controls {
      position: absolute; top: 0; left: 0; right: 0;
      padding-top: max(16px, env(safe-area-inset-top));
      display: flex; justify-content: center; align-items: center;
      z-index: 10; pointer-events: none;
    }
    .preview-top-controls > * { pointer-events: auto; }

    .original-mute-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(15,15,15,0.7); border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; transition: transform 0.2s ease, background 0.2s ease;
    }
    .original-mute-btn:active { transform: scale(0.92); }
    .original-mute-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .original-mute-btn.muted { background: rgba(255,59,48,0.25); border-color: rgba(255,59,48,0.5); }
    .original-mute-btn.muted svg { fill: #ff3b30; }

    .thumbnail-btn-overlay {
      position: absolute; left: 16px; z-index: 10;
      cursor: pointer; pointer-events: auto; transition: transform 0.2s ease;
    }
    .thumbnail-btn-overlay:active { transform: scale(0.92); }
    .thumbnail-btn-overlay canvas {
      width: 70px !important; height: 95px !important;
      min-width: 70px !important; max-width: 70px !important;
      min-height: 95px !important; max-height: 95px !important;
      border-radius: 14px; border: 2px solid rgba(255,255,255,0.65);
      display: block; background: rgba(255,255,255,0.08);
      image-rendering: -webkit-optimize-contrast;
    }

    .music-trigger-row { display: flex; justify-content: center; pointer-events: auto; }

    .music-overlay {
      padding: 0 12px; display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, rgba(15,15,15,0.85), rgba(25,25,25,0.85));
      border: 1px solid rgba(255,255,255,0.18); border-radius: 22px;
      color: #fff; font-size: 13px; backdrop-filter: blur(14px);
      cursor: pointer; height: 44px; max-width: 200px; min-width: 0;
      pointer-events: auto; overflow: hidden;
    }
    .music-overlay.empty .music-clear { display: none; }
    .music-meta { display: flex; flex-direction: column; min-width: 0; }
    .music-title { font-weight: 800; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    .music-artist, .music-duration { display: none; }
    .music-visual { display: inline-flex; align-items: center; justify-content: center; gap: 10px; min-width: 0; }
    .music-overlay.empty .music-visual { width: auto; justify-content: center; }
    .music-overlay.empty .music-meta { flex: 1; min-width: 0; text-align: center; }
    .music-overlay.empty .music-title { max-width: none; }
    .music-icon { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; display: block; }
    .music-clear {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
      color: #fff; display: grid; place-items: center; flex-shrink: 0; transition: all 0.2s;
    }
    .music-clear svg { width: 12px; height: 12px; }
    .music-clear:active { transform: scale(0.92); }

    .video-progress-bar {
      position: absolute; left: 0; right: 0; height: 28px; z-index: 15;
      cursor: pointer; display: flex; align-items: flex-end; touch-action: none;
    }
    .video-progress-bar-bg {
      width: 100%; height: 3px; background: rgba(255,255,255,0.2);
      position: relative; flex-shrink: 0;
    }
    .video-progress-bar-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 0%; background: #fff; border-radius: 0 2px 2px 0;
    }
    .video-progress-thumb {
      position: absolute; top: 50%; left: 0%;
      width: 14px; height: 14px; border-radius: 50%; background: #fff;
      transform: translate(-50%, -50%); box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.15s ease; pointer-events: none;
    }
    .video-progress-bar:active .video-progress-thumb,
    .video-progress-bar.dragging .video-progress-thumb { opacity: 1; }

    #preview-actions {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.92) 60%, rgba(0,0,0,0) 100%);
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 32px 20px max(14px, env(safe-area-inset-bottom));
      pointer-events: auto; z-index: 20;
    }
    .action-btn { flex: 1; height: 50px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; border-radius: 14px; }
    #restart-button { background: #1c1c1e; color: #fff; border: 1px solid #333; }
    #next-button { background: #fff; color: #000; }

    #music-controls {
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 80dvh; max-height: 80dvh;
      pointer-events: auto; z-index: 100;
    }

    #thumbnail-sheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.97);
      border-top-left-radius: 26px; border-top-right-radius: 26px;
      z-index: 90; transform: translateY(100%);
      transition: transform 0.36s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      padding: 18px 20px calc(20px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 -18px 40px rgba(0,0,0,0.55);
    }
    #thumbnail-sheet.active { transform: translateY(0); pointer-events: auto; }
    .thumbnail-sheet-handle { width: 70px; height: 6px; border-radius: 10px; background: #2f2f2f; align-self: center; margin-bottom: 4px; }
    .thumbnail-sheet-title { font-size: 15px; font-weight: 700; color: #fff; text-align: center; }
    .thumbnail-preview-container { display: flex; justify-content: center; }
    .thumbnail-preview-inner {
      width: min(160px, 45vw); aspect-ratio: 9/16; border-radius: 14px;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06); box-shadow: 0 12px 24px rgba(0,0,0,0.45);
    }
    #thumbnailCanvas { width: 100%; height: 100%; display: block; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }
    .thumbnail-slider-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
    }
    .thumbnail-slider-label { font-size: 12px; color: rgba(255,255,255,0.65); flex: 0 0 auto; }
    .thumbnail-time-slider { flex: 1; min-width: 0; touch-action: pan-x; cursor: pointer; }
    .thumbnail-time-display { font-size: 12px; color: rgba(255,255,255,0.9); min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
    .thumbnail-sheet-close {
      height: 50px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .thumbnail-sheet-close:active { transform: scale(0.97); }

    .sheet-backdrop {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.65));
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 98;
    }
    .sheet-backdrop.active { opacity: 1; pointer-events: auto; }

    .sheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 20px 18px 0; display: flex; flex-direction: column; gap: 18px;
      background: rgba(10,10,10,0.96); color: #fff;
      border-top-left-radius: 26px; border-top-right-radius: 26px;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 100; box-shadow: 0 -18px 40px rgba(0,0,0,0.55);
      height: 80dvh; max-height: 80dvh;
      overflow: hidden; overflow-x: hidden; pointer-events: none; will-change: transform;
    }
    .sheet.active { transform: translateY(0); pointer-events: auto; }
    #music-filter-sheet { height: 35dvh; max-height: 35dvh; z-index: 101; transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1); }
    .sheet .sheet-handle { width: 70px; height: 6px; border-radius: 10px; background: #2f2f2f; align-self: center; margin-bottom: 4px; }
    .sheet-content { display: flex; flex-direction: column; gap: 18px; flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 24px; }
    .sheet header { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .sheet .title { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; font-weight: 800; letter-spacing: 0.3px; text-align: center; }
    .sheet label { font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .sheet input[type="search"] {
      width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid #2b2b2d;
      background: #131316; color: #fff; font-size: 16px;
      -webkit-appearance: none; appearance: none; transform: translateZ(0);
    }
    .sheet input[type="search"]:focus { outline: none; border-color: rgba(255,255,255,0.35); }
    .sheet select, .sheet input[type="range"] { flex: 1; padding: 8px 10px; border-radius: 12px; border: 1px solid #2b2b2d; background: #151519; color: #fff; }
    .sheet .toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; background: rgba(255,255,255,0.04); padding: 12px; border-radius: 14px; border: 1px solid #1f1f24; }
    .music-search-row { display: flex; gap: 10px; align-items: center; width: 100%; position: relative; }
    .music-search-row input[type="search"] { flex: 1 1 auto; min-width: 0; width: auto; }
    .music-filter-btn {
      height: 44px; min-width: 44px; width: 44px; padding: 0;
      border-radius: 14px; border: 1px solid #2b2b2d; background: #151519; color: #fff;
      display: grid; place-items: center; cursor: pointer; flex-shrink: 0;
    }
    .music-filter-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .tag-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .tag-chip { border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #fff; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s ease, border-color 0.15s ease; }
    .tag-chip.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); }
    #music-list { flex: 1; min-height: 0; max-height: none; overflow: auto; display: flex; flex-direction: column; gap: 8px; margin: 6px 0 4px; }
    .music-item { padding: 12px 12px; border-radius: 14px; border: 1px solid #1f1f1f; background: linear-gradient(145deg, #121216, #0e0e10); display: flex; align-items: center; gap: 10px; cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
    .music-item.active { border-color: #fff; background: #1f1f1f; }
    .music-item .title { font-weight: 700; font-size: 14px; }
    .music-item .artist { font-size: 12px; color: #b5b5b5; }
    .music-list-cover { width: 50px; height: 50px; border-radius: 14px; background: rgba(255,255,255,0.08) center/cover no-repeat; border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); flex-shrink: 0; }
    .music-list-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; align-items: flex-start; text-align: left; }
    .music-list-duration { font-size: 12px; color: #dcdcdc; font-weight: 700; }
    .timeline-row { display: flex; flex-direction: column; gap: 8px; padding: 12px; border-radius: 16px; border: 1px solid #1d1d22; background: rgba(255,255,255,0.03); }
    .timeline-row .timeline-header { display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 13px; color: #e5e5e7; }
    .timeline-row .time-chip { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 6px 10px; font-size: 12px; letter-spacing: 0.2px; }
    .waveform-visual {
      height: 72px; border-radius: 14px; border: 1px solid #1f1f24;
      background: rgba(255,255,255,0.04); display: grid; grid-auto-flow: column;
      grid-auto-columns: 1fr; gap: 2px; padding: 8px 10px; align-items: center;
      cursor: pointer; overflow: hidden; position: relative; touch-action: none; overscroll-behavior: none;
    }
    .waveform-visual span { display: block; width: 3px; align-self: center; border-radius: 3px; background: rgba(255,255,255,0.22); transition: background 0.15s, transform 0.15s; height: var(--bar-height, 30%); }
    .waveform-visual span.active { background: rgba(255,255,255,0.9); transform: scaleY(1.08); }
    .waveform-handle { position: absolute; top: 4px; bottom: 4px; width: 2px; background: rgba(255,255,255,0.95); transform: translateX(-50%); border-radius: 2px; pointer-events: none; }
    .waveform-handle.end { background: rgba(255,255,255,0.5); }
    .slider-row { display: flex; align-items: center; gap: 10px; }

    .icon-btn {
      border: 1px solid var(--glass-border); background: var(--glass-bg); color: #fff;
      border-radius: 12px; padding: 8px 10px; cursor: pointer;
      display: grid; place-items: center; transition: transform 0.2s ease;
      min-width: 40px; min-height: 36px;
    }
    .icon-btn svg { width: 20px; height: 20px; display: block; }
    .icon-btn.loading { position: relative; cursor: default; }
    .icon-btn.loading svg { opacity: 0; }
    .icon-btn.loading::after {
      content: ''; position: absolute; inset: 0; margin: auto;
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff; border-radius: 50%; box-sizing: border-box;
      animation: spin 0.8s linear infinite;
    }
    .icon-btn:active { transform: scale(0.95); }
    .icon-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .audio-tab-content { display: flex; flex-direction: column; gap: 14px; }
    .volume-section { display: flex; flex-direction: column; gap: 10px; padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); }
    .volume-section-label { font-size: 13px; font-weight: 700; color: #e5e5e7; display: flex; justify-content: space-between; align-items: center; }
    .volume-value-chip { padding: 4px 10px; border-radius: 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); font-size: 12px; letter-spacing: 0.3px; min-width: 40px; text-align: center; color: #fff; }

    .vol-slider { --slider-hit-padding: 22px; -webkit-appearance: none; appearance: none; width: 100%; height: calc(8px + var(--slider-hit-padding) * 2); padding: var(--slider-hit-padding) 0; background: transparent; border-radius: 999px; outline: none; border: none; touch-action: pan-x; cursor: pointer; }
    .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.35); margin-top: calc((8px - 18px) / 2); }
    .vol-slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #fff; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.35); }
    .vol-slider::-moz-range-track { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.16); border: none; box-shadow: inset 0 1px 0 rgba(255,255,255,0.1); }
    .vol-slider::-webkit-slider-runnable-track { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.16); box-shadow: inset 0 1px 0 rgba(255,255,255,0.1); }

    .tab-bar { display: flex; gap: 10px; background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.12); padding: 6px 10px; border-radius: 16px; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .tab-btn { flex: 1; height: 46px; border-radius: 12px; border: 1px solid transparent; background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.2s ease; display: grid; place-items: center; }
    .tab-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .tab-btn.active { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.35); box-shadow: 0 10px 20px rgba(0,0,0,0.35); }
    .tab-btn .tab-label { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    .tab-panel { display: none; flex-direction: column; gap: 14px; }
    .tab-panel.active { display: flex; }
    .sheet header .title svg { width: 18px; height: 18px; fill: currentColor; }

    #upload-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; opacity: 0; visibility: hidden; transition: opacity 0.2s; }
    #upload-overlay.active { opacity: 1; visibility: visible; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #upload-text { display: flex; flex-direction: column; }
    #upload-progress-text, #upload-mix-text { color: #fff; font-weight: 600; text-align: center; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s ease; }
    #upload-progress-text { font-size: 18px; order: 2; margin-top: 20px; }
    #upload-mix-text { font-size: 16px; line-height: 1.4; max-width: 320px; white-space: pre-line; opacity: 0; order: 0; margin-bottom: 20px; }
    #upload-text.show-mixing #upload-progress-text { opacity: 0; }
    #upload-text.show-mixing #upload-mix-text { opacity: 1; }
    #upload-overlay .spinner { order: 1; }
    #upload-cancel-btn { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); font-size: 15px; font-weight: 600; padding: 12px 32px; border-radius: 14px; cursor: pointer; transition: all 0.2s ease; order: 3; }
    #upload-cancel-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.08); }
    #upload-cancel-btn.hidden { display: none; }

    #error-toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(255, 59, 48, 0.9); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 14px; z-index: 300; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; text-align: center; width: 90%; max-width: 300px; }
    #error-toast.active { opacity: 1; transform: translateX(-50%) translateY(0); }

    #recording-timer { position: fixed; top: calc(env(safe-area-inset-top) + 6px); left: 50%; transform: translateX(-50%); z-index: 45; padding: 8px 14px; border-radius: 20px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; opacity: 0; transition: opacity 0.2s ease; pointer-events: none; }
    body.recording #recording-timer { opacity: 1; }

    input[type="file"] { display: none; }
    body.showing-preview .controls { display: none !important; }
    body.showing-preview #filter-bar-container { display: none !important; }
    .visually-hidden { position: absolute !important; height: 1px; width: 1px; overflow: hidden; clip: rect(1px, 1px, 1px, 1px); white-space: nowrap; }
  </style>
</head>
<body>

  <div id="countdown-display"></div>
  <div id="error-toast">Erreur</div>
  <div id="recording-timer">0:00</div>

  <div id="camera-container">
    <video id="camera-preview" playsinline muted autoplay></video>
    <!-- Canvas filtré par-dessus la caméra -->
    <canvas id="filter-canvas"></canvas>
    <div class="controls">

        </button>
        <button type="button" class="btn" id="timer-btn">
          <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"></path></svg>
          <span id="timer-text">OFF</span>
        </button>
      </div>
      <div class="bottom-bar">
        <div class="side">
          <button type="button" class="btn" id="gallery-btn">
            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"></path></svg>
          </button>
        </div>
        <div class="record-wrap" id="record-wrap-btn">
          <svg class="record-progress" viewBox="0 0 100 100"><circle id="record-progress-circle" cx="50" cy="50" r="46"></circle></svg>
          <div class="record-button" id="record-btn"><div class="record-inner"></div></div>
        </div>
        <div class="side">
          <button type="button" class="btn" id="switch-btn">
            <svg viewBox="0 0 24 24"><path d="M12 6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8 0 1.57.46 3.03 1.24 4.26L6.7 14.8c-.45-.83-.7-1.79-.7-2.8 0-3.31 2.69-6 6-6zm6.76 1.74L17.3 9.2c.44.84.7 1.79.7 2.8 0 3.31-2.69 6-6 6v-3l-4 4 4 4v-3c4.42 0 8-3.58 8-8 0-1.57-.46-3.03-1.24-4.26z"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- BARRE DE FILTRES (au-dessus du bottom-bar) -->
  <div id="filter-bar-container">
    <div id="filter-bar"></div>
  </div>

  <!-- ===================== PREVIEW OVERLAY ===================== -->
  <div id="preview-overlay">
    <video id="preview-video" playsinline webkit-playsinline preload="auto" loop disablepictureinpicture x-webkit-airplay="deny"></video>
    <div class="preview-scrim"></div>

    <div id="tap-to-play">
      <div class="tap-to-play-btn">
        <svg class="tap-to-play-icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="tap-to-play-icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </div>
      <span class="tap-to-play-label">Appuyer pour lire</span>
    </div>

    <div class="preview-top-controls">
      <div class="music-trigger-row" id="music-trigger-row">
        <div id="music-overlay" class="music-overlay empty">
          <div class="music-visual">
            <svg class="music-icon" viewBox="0 0 256 256" aria-hidden="true"><path d="M211.79 35.48a8 8 0 0 0-6.62-1.43l-96 20a8 8 0 0 0-6.54 7.86V168a28 28 0 1 0 16 25.45V121.89l80-16.67V152a28 28 0 1 0 16 25.45V43.91a8 8 0 0 0-3.38-6.63ZM88 216a12 12 0 1 1 12-12 12 12 0 0 1-12 12Zm28-106.67V79.12l80-16.67v30.22Zm80 106.67a12 12 0 1 1 12-12 12 12 0 0 1-12 12Z"></path></svg>
          </div>
          <div class="music-meta">
            <span class="music-title">Ajouter un son</span>
            <span class="music-artist"></span>
            <span class="music-duration" id="music-duration"></span>
          </div>
          <button type="button" id="music-clear-btn" class="music-clear" aria-label="Supprimer la musique">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.5 3.5l9 9m0-9l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div style="position:absolute;top:0;right:16px;padding-top:max(16px,env(safe-area-inset-top));z-index:11;pointer-events:auto;">
      <button type="button" class="original-mute-btn" id="original-mute-btn" aria-label="Volume son original">
        <svg id="mic-icon-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg id="mic-icon-off" viewBox="0 0 24 24" aria-hidden="true" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
    </div>

    <div class="thumbnail-btn-overlay" id="thumbnail-btn-overlay" aria-label="Choisir la miniature">
      <canvas id="thumbnailCanvas"></canvas>
    </div>

    <div id="music-controls" class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-content">
        <div class="tab-bar" id="music-tab-bar">
          <button type="button" class="tab-btn active" id="tab-btn-music" aria-label="Musique">
            <svg viewBox="0 0 256 256" aria-hidden="true"><path d="M211.79 35.48a8 8 0 0 0-6.62-1.43l-96 20a8 8 0 0 0-6.54 7.86V168a28 28 0 1 0 16 25.45V121.89l80-16.67V152a28 28 0 1 0 16 25.45V43.91a8 8 0 0 0-3.38-6.63ZM88 216a12 12 0 1 1 12-12 12 12 0 0 1-12 12Zm28-106.67V79.12l80-16.67v30.22Zm80 106.67a12 12 0 1 1 12-12 12 12 0 0 1-12 12Z"></path></svg>
            <span class="tab-label">Musique</span>
          </button>
          <button type="button" class="tab-btn" id="tab-btn-waveform" aria-label="Waveform">
            <svg viewBox="0 0 256 256" aria-hidden="true"><path d="M56 64a8 8 0 0 1 8 8v112a8 8 0 0 1-16 0V72a8 8 0 0 1 8-8Zm36 24a8 8 0 0 1 8 8v64a8 8 0 0 1-16 0V96a8 8 0 0 1 8-8Zm36-40a8 8 0 0 1 8 8v144a8 8 0 0 1-16 0V56a8 8 0 0 1 8-8Zm36 32a8 8 0 0 1 8 8v96a8 8 0 0 1-16 0V88a8 8 0 0 1 8-8Zm36-24a8 8 0 0 1 8 8v144a8 8 0 0 1-16 0V64a8 8 0 0 1 8-8Z"></path></svg>
            <span class="tab-label">Waveform</span>
          </button>
          <button type="button" class="tab-btn" id="tab-btn-audio" aria-label="Son">
            <svg viewBox="0 0 256 256" aria-hidden="true"><path d="M32 96v64a16 16 0 0 0 16 16h32l48 48a8 8 0 0 0 13.66-5.66V37.66A8 8 0 0 0 128 32L80 80H48a16 16 0 0 0-16 16Zm136 8a8 8 0 0 1 8 8v32a8 8 0 0 1-16 0v-32a8 8 0 0 1 8-8Zm32-24a8 8 0 0 1 8 8v80a8 8 0 0 1-16 0V88a8 8 0 0 1 8-8Z"></path></svg>
            <span class="tab-label">Son</span>
          </button>
        </div>

        <div id="tab-music" class="tab-panel active">
          <div class="music-search-row">
            <input id="music-search" type="search" placeholder="Rechercher un titre ou un artiste" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <button type="button" id="music-filter-btn" class="music-filter-btn" aria-label="Filtre">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.25 5.61C6.27 8.2 10 13 10 13v6c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-6s3.72-4.8 5.74-7.39A.998.998 0 0 0 18.95 4H5.04a1 1 0 0 0-.79 1.61z"/></svg>
            </button>
          </div>
          <div id="music-list" class="music-list"></div>
        </div>

        <div id="tab-waveform" class="tab-panel">
          <div class="timeline-row">
            <div class="timeline-header">
              <span>Choisir le passage</span>
              <div class="time-actions">
                <span class="time-chip" id="music-position-label">0:00 – 0:00 / 0:00</span>
              </div>
            </div>
            <div id="waveform-visual" class="waveform-visual" role="presentation"></div>
          </div>
        </div>

        <div id="tab-audio" class="tab-panel">
          <div class="audio-tab-content">
            <div class="volume-section">
              <div class="volume-section-label">
                <span>Son original</span>
                <span class="volume-value-chip" id="original-volume-value">100</span>
              </div>
              <input id="original-volume-slider" class="vol-slider" type="range" min="0" max="1" step="0.01" value="1" />
            </div>
            <div class="volume-section">
              <div class="volume-section-label">
                <span>Volume musique</span>
                <span class="volume-value-chip" id="music-volume-value">50</span>
              </div>
              <input id="music-volume" class="vol-slider" type="range" min="0" max="1" step="0.01" value="0.5" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="video-progress-bar" id="video-progress-bar">
      <div class="video-progress-bar-bg">
        <div class="video-progress-bar-fill" id="video-progress-fill"></div>
        <div class="video-progress-thumb" id="video-progress-thumb"></div>
      </div>
    </div>

    <div id="preview-actions">
      <button type="button" id="restart-button" class="action-btn">Recommencer</button>
      <button type="button" id="next-button" class="action-btn">Suivant</button>
    </div>

    <div id="sheet-backdrop" class="sheet-backdrop"></div>

    <div id="music-filter-sheet" class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-content">
        <header>
          <div class="title">
            <svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;fill:currentColor;"><path d="M4.25 5.61C6.27 8.2 10 13 10 13v6c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-6s3.72-4.8 5.74-7.39A.998.998 0 0 0 18.95 4H5.04a1 1 0 0 0-.79 1.61z"/></svg>
            <span>Filtres</span>
          </div>
        </header>
        <div id="music-filter-tags" class="tag-grid"></div>
      </div>
    </div>

    <div id="thumbnail-sheet">
      <div class="thumbnail-sheet-handle"></div>
      <div class="thumbnail-sheet-title">Choisir la miniature</div>
      <div class="thumbnail-preview-container">
        <div class="thumbnail-preview-inner">
          <canvas id="thumbnailCanvasSheet"></canvas>
        </div>
      </div>
      <div class="thumbnail-slider-row">
        <label for="thumbnail-time-slider" class="thumbnail-slider-label">Moment</label>
        <input id="thumbnail-time-slider" class="thumbnail-time-slider" type="range" min="0" max="0" step="0.1" value="0" />
        <span id="thumbnail-time-display" class="thumbnail-time-display">0:00</span>

  <div id="upload-overlay">
    <div class="spinner"></div>
    <div id="upload-text">
      <span id="upload-mix-text"></span>
      <span id="upload-progress-text">Préparation...</span>
    </div>
    <button type="button" id="upload-cancel-btn" class="hidden">Annuler</button>
  </div>
  <input type="file" id="camera-input" accept="video/*" capture="environment" />
  <input type="file" id="galleryInput" accept="video/*" />

  <script>

    /* =====================================================
       FILTRES CAMÉRA — moteur WebGL LUT
       ===================================================== */

    const FILTERS = [
      { id:'naturel', name:'Naturel', css:'none',                                dot:null,                                       privacy:false, faceEffect:null       },
      { id:'soleil',  name:'Soleil',  css:'brightness(1.04) saturate(1.05)',      dot:'linear-gradient(135deg,#f9e04b,#f5a623)', privacy:false, faceEffect:'soleil'   },
      { id:'doux',    name:'Doux',    css:'brightness(1.03) saturate(0.96)',       dot:'linear-gradient(135deg,#f5d9c0,#e8a870)', privacy:false, faceEffect:'soft'     },
      { id:'rose',    name:'Rose',    css:'brightness(1.03) saturate(1.04)',       dot:'linear-gradient(135deg,#ffb6c8,#f06090)', privacy:false, faceEffect:'rose'     },
      { id:'glamour', name:'Glamour', css:'brightness(1.04) contrast(1.03)',       dot:'linear-gradient(135deg,#e8c8f0,#b060d0)', privacy:false, faceEffect:'glamour'  },
      { id:'dore',    name:'Doré',    css:'brightness(1.03) saturate(1.06)',       dot:'linear-gradient(135deg,#ffd580,#c87820)', privacy:false, faceEffect:'dore'     },
      { id:'mascara', name:'Mascara', css:'brightness(1.02) contrast(1.04)',       dot:'linear-gradient(135deg,#777,#111)',       privacy:false, faceEffect:'mascara'  },
      { id:'blush',   name:'Blush',   css:'brightness(1.03) saturate(1.05)',       dot:'linear-gradient(135deg,#ffb0b0,#e04060)', privacy:false, faceEffect:'blush'    },
      { id:'halo',    name:'Halo',    css:'brightness(1.05)',                      dot:'linear-gradient(135deg,#fffde0,#ffe066)', privacy:false, faceEffect:'halo'     },
      { id:'mystere', name:'Mystère', css:'none',                                 dot:'linear-gradient(135deg,#333,#000)',       privacy:true,  privacyType:'bar',  faceEffect:null },
      { id:'flou',    name:'Flou',    css:'none',                                 dot:'linear-gradient(135deg,#999,#333)',       privacy:true,  privacyType:'blur', faceEffect:null },
    ];
    let activeFilterId = 'naturel';

    function getActiveFilter() {
      return FILTERS.find(f => f.id === activeFilterId) || FILTERS[0];
    }

    /* =====================================================
       MOTEUR BEAUTY v3 — WebGL cover-fit + MediaPipe
       ===================================================== */

    let gl = null, glCanvas = null, glRaf = null;
    let glProgram = null, glVideoTex = null;
    let glRunning = false;

    let mpFaceMesh = null, mpReady = false, mpLoading = false, mpLoadFailed = false;
    let lastFaceLandmarks = null, mpRafId = null;
    let overlayCanvas = null, overlayCtx = null;
    let mysteryBarEl = null;
    let eyeBlurCanvas = null, eyeBlurCtx = null, eyeBlurRaf = null, eyeBlurMpRaf = null;
    let glassesEl = null, glassesRaf = null;

    // ---- Vertex shader : cover-fit correct ----
    // On calcule le crop dans le vertex shader pour que
    // la vidéo remplisse le canvas sans déformation
    const VS_SRC = `
      attribute vec2 a_pos;
      varying vec2 v_uv;
      uniform vec2 u_scale;   // facteur de crop pour cover-fit
      uniform vec2 u_offset;  // offset de centrage
      uniform bool u_flip;
      void main() {
        // UV couvrant tout le canvas (0..1)
        vec2 uv = vec2(a_pos.x * 0.5 + 0.5, 0.5 - a_pos.y * 0.5);
        // Appliquer le cover-fit : crop + centrer
        uv = uv * u_scale + u_offset;
        // Miroir caméra frontale
        if (u_flip) uv.x = 1.0 - uv.x;
        v_uv = uv;
        gl_Position = vec4(a_pos, 0.0, 1.0);
      }
    `;

    // ---- Fragment shader : skin detection + lissage ----
    const FS_SRC = `
      precision mediump float;
      uniform sampler2D u_video;
      uniform vec2 u_px;
      uniform float u_smooth;
      uniform float u_bright;
      uniform float u_warmth;
      uniform float u_glow;
      varying vec2 v_uv;

      float isSkin(vec3 c) {
        float y  =  0.299*c.r + 0.587*c.g + 0.114*c.b;
        float cb = -0.169*c.r - 0.331*c.g + 0.500*c.b + 0.5;
        float cr =  0.500*c.r - 0.419*c.g - 0.081*c.b + 0.5;
        float inCb = step(0.73, cb) * (1.0 - step(0.92, cb));
        float inCr = step(0.78, cr) * (1.0 - step(0.94, cr));
        float inY  = step(0.12, y)  * (1.0 - step(0.98, y));
        return clamp(inCb * inCr * inY, 0.0, 1.0);
      }

      vec3 smoothSkin(vec2 uv, float mask) {
        if (mask < 0.01) return texture2D(u_video, uv).rgb;
        vec3 col = vec3(0.0);
        float total = 0.0;
        for (int dx = -2; dx <= 2; dx++) {
          for (int dy = -2; dy <= 2; dy++) {
            float w = exp(-float(dx*dx + dy*dy) * 0.45);
            vec2 off = vec2(float(dx), float(dy)) * u_px * 2.2;
            vec3 s = texture2D(u_video, uv + off).rgb;
            float ns = isSkin(s);
            w *= (0.35 + 0.65 * ns);
            col += s * w;
            total += w;
          }
        }
        col /= total;
        vec3 orig = texture2D(u_video, uv).rgb;
        return mix(orig, col, mask * u_smooth);
      }

      void main() {
        if (v_uv.x < 0.0 || v_uv.x > 1.0 || v_uv.y < 0.0 || v_uv.y > 1.0) {
          gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
          return;
        }
        vec3 orig = texture2D(u_video, v_uv).rgb;
        float skinVal = isSkin(orig);
        vec3 col = smoothSkin(v_uv, skinVal);
        float lum = dot(col, vec3(0.299, 0.587, 0.114));
        float hilight = smoothstep(0.52, 0.82, lum) * skinVal;
        col += hilight * u_glow * vec3(0.10, 0.08, 0.06);
        col.r += skinVal * u_warmth * 0.035;
        col.g += skinVal * u_warmth * 0.012;
        col.b -= skinVal * u_warmth * 0.018;
        col *= (1.0 + u_bright * 0.10);
        gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
      }
    `;

    function initWebGL() {
      glCanvas = document.getElementById('filter-canvas');
      if (!glCanvas) return false;
      gl = glCanvas.getContext('webgl', {
        antialias: false, alpha: false, preserveDrawingBuffer: true
      });
      if (!gl) return false;
      const vs = compileShader(gl.VERTEX_SHADER, VS_SRC);
      const fs = compileShader(gl.FRAGMENT_SHADER, FS_SRC);
      if (!vs || !fs) { gl = null; return false; }
      glProgram = gl.createProgram();
      gl.attachShader(glProgram, vs);
      gl.attachShader(glProgram, fs);
      gl.linkProgram(glProgram);
      if (!gl.getProgramParameter(glProgram, gl.LINK_STATUS)) {
        console.warn('GL link:', gl.getProgramInfoLog(glProgram));
        gl = null; return false;
      }
      gl.useProgram(glProgram);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER,
        new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(glProgram, 'a_pos');
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
      glVideoTex = createTex();
      return true;
    }

    function compileShader(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.warn('Shader:', gl.getShaderInfoLog(s)); return null;
      }
      return s;
    }
    function createTex() {
      const t = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, t);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      return t;
    }

    // Calculer le cover-fit : scale + offset pour que la vidéo
    // remplisse le canvas sans déformation (comme object-fit:cover)
    function computeCoverFit(videoW, videoH, canvasW, canvasH) {
      const videoRatio = videoW / videoH;
      const canvasRatio = canvasW / canvasH;
      let scaleX, scaleY, offsetX, offsetY;
      if (videoRatio > canvasRatio) {
        // Vidéo plus large → crop horizontal
        scaleY = 1.0;
        scaleX = canvasRatio / videoRatio;
        offsetX = (1.0 - scaleX) / 2.0;
        offsetY = 0.0;
      } else {
        // Vidéo plus haute → crop vertical
        scaleX = 1.0;
        scaleY = videoRatio / canvasRatio;
        offsetX = 0.0;
        offsetY = (1.0 - scaleY) / 2.0;
      }
      return { scaleX, scaleY, offsetX, offsetY };
    }

    function resizeGL() {
      if (!glCanvas) return;
      const W = window.innerWidth, H = window.innerHeight;
      if (glCanvas.width !== W || glCanvas.height !== H) {
        glCanvas.width = W; glCanvas.height = H;
        if (gl) gl.viewport(0, 0, W, H);
      }
    }

    const FILTER_PARAMS = {
      naturel:  { smooth:0.0,  bright:0.0,  warmth:0.0,  glow:0.0  },
      soleil:   { smooth:0.85, bright:0.90, warmth:1.0,  glow:1.0  },
      doux:     { smooth:1.0,  bright:0.55, warmth:0.55, glow:0.65 },
      rose:     { smooth:0.90, bright:0.70, warmth:0.60, glow:0.75 },
      glamour:  { smooth:0.95, bright:0.95, warmth:0.80, glow:1.0  },
      dore:     { smooth:0.88, bright:0.80, warmth:1.0,  glow:0.85 },
      mascara:  { smooth:0.80, bright:0.30, warmth:0.30, glow:0.45 },
      blush:    { smooth:0.90, bright:0.70, warmth:0.70, glow:0.75 },
      halo:     { smooth:0.75, bright:0.65, warmth:0.50, glow:0.70 },
    };

    function renderGLFrame() {
      if (!glRunning) return;
      const video = document.getElementById('camera-preview');
      if (!gl || !video || video.readyState < 2) {
        glRaf = requestAnimationFrame(renderGLFrame); return;
      }
      resizeGL();
      const W = glCanvas.width, H = glCanvas.height;
      const vW = video.videoWidth || W;
      const vH = video.videoHeight || H;
      const f = getActiveFilter();
      const p = FILTER_PARAMS[f.id] || FILTER_PARAMS.naturel;
      const { scaleX, scaleY, offsetX, offsetY } = computeCoverFit(vW, vH, W, H);

      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, glVideoTex);
      try { gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,video); } catch(e) {
        glRaf = requestAnimationFrame(renderGLFrame); return;
      }

      gl.uniform1i(gl.getUniformLocation(glProgram,'u_video'), 0);
      gl.uniform2f(gl.getUniformLocation(glProgram,'u_px'), 1/vW, 1/vH);
      gl.uniform2f(gl.getUniformLocation(glProgram,'u_scale'), scaleX, scaleY);
      gl.uniform2f(gl.getUniformLocation(glProgram,'u_offset'), offsetX, offsetY);
      gl.uniform1i(gl.getUniformLocation(glProgram,'u_flip'), facingMode==='user'?1:0);
      gl.uniform1f(gl.getUniformLocation(glProgram,'u_smooth'), p.smooth);
      gl.uniform1f(gl.getUniformLocation(glProgram,'u_bright'), p.bright);
      gl.uniform1f(gl.getUniformLocation(glProgram,'u_warmth'), p.warmth);
      gl.uniform1f(gl.getUniformLocation(glProgram,'u_glow'),   p.glow);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      glRaf = requestAnimationFrame(renderGLFrame);
    }

    function startGLLoop() {
      if (!gl) return;
      resizeGL();
      glCanvas.style.cssText = [
        'position:absolute','inset:0','width:100%','height:100%',
        'z-index:2','pointer-events:none','opacity:1','visibility:visible'
      ].join(';');
      glRunning = true;
      if (glRaf) cancelAnimationFrame(glRaf);
      glRaf = requestAnimationFrame(renderGLFrame);
    }
    function stopGLLoop() {
      glRunning = false;
      if (glRaf) { cancelAnimationFrame(glRaf); glRaf = null; }
      if (glCanvas) { glCanvas.style.opacity='0'; glCanvas.style.visibility='hidden'; }
    }

    // ---- MediaPipe ----
    function loadScript(src) {
      return new Promise((res, rej) => {
        if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
        const s = document.createElement('script');
        s.src = src; s.crossOrigin = 'anonymous';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    async function loadMediaPipe() {
      if (mpLoading||mpReady||mpLoadFailed) return;
      mpLoading = true;
      try {
        await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js');
        mpFaceMesh = new window.FaceMesh({
          locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${f}`
        });
        mpFaceMesh.setOptions({
          maxNumFaces:1, refineLandmarks:true,
          minDetectionConfidence:0.55, minTrackingConfidence:0.5
        });
        mpFaceMesh.onResults(r => {
          lastFaceLandmarks = r.multiFaceLandmarks?.[0] || null;
        });
        await mpFaceMesh.initialize();
        mpReady = true; mpLoading = false;
        startMPLoop();
      } catch(e) {
        console.warn('MediaPipe failed:', e);
        mpLoadFailed = true; mpLoading = false;
      }
    }

    let mpLastSend = 0, mpLoopActive = false;
    function startMPLoop() {
      if (!mpReady || mpLoopActive) return;
      mpLoopActive = true;
      const tick = async () => {
        if (!mpLoopActive || !mpReady || !isFilterWithFaceEffect()) {
          mpRafId = null; mpLoopActive = false; return;
        }
        const now = performance.now();
        const video = document.getElementById('camera-preview');
        if (video && video.readyState >= 2 && now - mpLastSend > 80) {
          mpLastSend = now;
          try { await mpFaceMesh.send({ image: video }); } catch(e) {}
        }
        if (!mpLoopActive) { mpRafId = null; return; }
        resizeOverlayCanvas();
        drawFaceEffects();
        mpRafId = requestAnimationFrame(tick);
      };
      mpRafId = requestAnimationFrame(tick);
    }
    function stopMPLoop() {
      mpLoopActive = false;
      if (mpRafId) { cancelAnimationFrame(mpRafId); mpRafId = null; }
      lastFaceLandmarks = null;
      if (overlayCtx && overlayCanvas)
        overlayCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
    }
    function isFilterWithFaceEffect() {
      const f = getActiveFilter();
      return !!(f.faceEffect && !f.privacy);
    }

    function ensureOverlayCanvas() {
      if (overlayCanvas) return;
      overlayCanvas = document.createElement('canvas');
      overlayCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none;';
      document.getElementById('camera-container').appendChild(overlayCanvas);
      overlayCtx = overlayCanvas.getContext('2d');
    }
    function removeOverlayCanvas() {
      if (overlayCanvas) { overlayCanvas.remove(); overlayCanvas = null; overlayCtx = null; }
    }
    function resizeOverlayCanvas() {
      if (!overlayCanvas) return;
      const W = window.innerWidth, H = window.innerHeight;
      if (overlayCanvas.width!==W || overlayCanvas.height!==H) {
        overlayCanvas.width=W; overlayCanvas.height=H;
      }
    }

    // ---- Points MediaPipe ----
    const MP_FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
    const MP_LEFT_CHEEK = [116,123,147,213,192,214,212,216,206,203,36,101,119];
    const MP_RIGHT_CHEEK = [345,352,376,433,411,434,432,436,426,423,266,330,348];
    // Yeux avec landmarks raffinés
    const MP_LEFT_EYE_INNER  = [133,173,157,158,159,160,161,246,33,7,163,144,145,153,154,155];
    const MP_RIGHT_EYE_INNER = [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398];
    // Coins externes des yeux pour positionner les lunettes
    const MP_LEFT_EYE_OUTER  = [33, 130, 226, 247, 30, 29, 27, 28, 56, 190];
    const MP_RIGHT_EYE_OUTER = [263, 359, 446, 467, 260, 259, 257, 258, 286, 414];

    function pt(lm, idx, W, H, flip) {
      const p = lm[idx]; if (!p) return null;
      return { x: flip ? W-p.x*W : p.x*W, y: p.y*H };
    }
    function getFaceCenter(lm, W, H, flip) {
      const pts = MP_FACE_OVAL.map(i=>pt(lm,i,W,H,flip)).filter(Boolean);
      if (!pts.length) return null;
      const cx = pts.reduce((s,p)=>s+p.x,0)/pts.length;
      const cy = pts.reduce((s,p)=>s+p.y,0)/pts.length;
      const rx = Math.max(...pts.map(p=>Math.abs(p.x-cx)));
      const ry = Math.max(...pts.map(p=>Math.abs(p.y-cy)));
      return { cx, cy, rx, ry };
    }
    function getFaceOvalPath(ctx, lm, W, H, flip) {
      const pts = MP_FACE_OVAL.map(i=>pt(lm,i,W,H,flip)).filter(Boolean);
      if (pts.length<3) return false;
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
      ctx.closePath(); return true;
    }

    // ---- Effets visage ----
    function drawFaceEffects() {
      if (!overlayCtx||!overlayCanvas) return;
      const W=overlayCanvas.width, H=overlayCanvas.height;
      overlayCtx.clearRect(0,0,W,H);
      if (!lastFaceLandmarks||!lastFaceLandmarks.length) return;
      const f = getActiveFilter();
      const lm = lastFaceLandmarks;
      const flip = facingMode==='user';

      if (f.faceEffect==='rose')    { drawCheekBlush(lm,W,H,flip,240,130,140,0.20); }
      if (f.faceEffect==='glamour') { drawCheekBlush(lm,W,H,flip,255,200,180,0.10); }
      if (f.faceEffect==='blush')   { drawCheekBlush(lm,W,H,flip,220,100,120,0.24); }
      if (f.faceEffect==='mascara') { drawEyeShadow(lm,W,H,flip); }
      if (f.faceEffect==='dore')    { drawWarmGlow(lm,W,H,flip); }
      if (f.faceEffect==='halo')    { drawHaloEffect(lm,W,H,flip); }
      // Lunettes pour Mystère (géré séparément via overlay)
    }

    function drawCheekBlush(lm,W,H,flip,r,g,b,alpha) {
      const ctx=overlayCtx;
      [MP_LEFT_CHEEK,MP_RIGHT_CHEEK].forEach(pts=>{
        const points=pts.map(i=>pt(lm,i,W,H,flip)).filter(Boolean);
        if(points.length<3) return;
        const cx=points.reduce((s,p)=>s+p.x,0)/points.length;
        const cy=points.reduce((s,p)=>s+p.y,0)/points.length;
        const rad=Math.max(...points.map(p=>Math.sqrt((p.x-cx)**2+(p.y-cy)**2)))*1.4;
        ctx.save(); ctx.filter='blur(8px)';
        const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        grad.addColorStop(0,`rgba(${r},${g},${b},${alpha})`);
        grad.addColorStop(0.5,`rgba(${r},${g},${b},${alpha*0.35})`);
        grad.addColorStop(1,`rgba(${r},${g},${b},0)`);
        ctx.fillStyle=grad;
        ctx.beginPath(); ctx.arc(cx,cy,rad*1.2,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    }

    function drawEyeShadow(lm,W,H,flip) {
      const ctx=overlayCtx;
      [MP_LEFT_EYE_INNER,MP_RIGHT_EYE_INNER].forEach(eyePts=>{
        const pts=eyePts.map(i=>pt(lm,i,W,H,flip)).filter(Boolean);
        if(pts.length<4) return;
        const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length;
        const cy=pts.reduce((s,p)=>s+p.y,0)/pts.length;
        const rad=Math.max(...pts.map(p=>Math.sqrt((p.x-cx)**2+(p.y-cy)**2)))*2.0;
        ctx.save(); ctx.filter='blur(5px)';
        const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        grad.addColorStop(0,'rgba(10,5,20,0.12)');
        grad.addColorStop(0.5,'rgba(10,5,20,0.05)');
        grad.addColorStop(1,'rgba(10,5,20,0)');
        ctx.fillStyle=grad;
        ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    }

    function drawWarmGlow(lm,W,H,flip) {
      const face=getFaceCenter(lm,W,H,flip); if(!face) return;
      const {cx,cy,rx,ry}=face; const ctx=overlayCtx;
      ctx.save();
      if(!getFaceOvalPath(ctx,lm,W,H,flip)){ctx.restore();return;}
      ctx.clip();
      const grad=ctx.createRadialGradient(cx,cy-ry*0.1,0,cx,cy,Math.max(rx,ry)*1.05);
      grad.addColorStop(0,'rgba(255,210,140,0.13)');
      grad.addColorStop(0.5,'rgba(255,200,120,0.06)');
      grad.addColorStop(1,'rgba(255,200,120,0)');
      ctx.fillStyle=grad; ctx.fillRect(0,0,W,H); ctx.restore();
    }

    // ---- Halo lumineux autour de la tête (ring light effect) ----
    function drawHaloEffect(lm, W, H, flip) {
      if (!overlayCtx) return;
      const ctx = overlayCtx;
      const pts = MP_FACE_OVAL.map(i => pt(lm,i,W,H,flip)).filter(Boolean);
      if (pts.length < 6) return;
      const cx = pts.reduce((s,p)=>s+p.x,0)/pts.length;
      const cy = pts.reduce((s,p)=>s+p.y,0)/pts.length;
      const maxR = Math.max(...pts.map(p=>Math.sqrt((p.x-cx)**2+(p.y-cy)**2)));
      const outerPts = pts.map(p => ({ x: cx+(p.x-cx)*1.32, y: cy+(p.y-cy)*1.32 }));
      const innerPts = pts.map(p => ({ x: cx+(p.x-cx)*1.02, y: cy+(p.y-cy)*1.02 }));
      ctx.save();
      ctx.filter = 'blur(7px)';
      ctx.beginPath();
      ctx.moveTo(outerPts[0].x, outerPts[0].y);
      for(let i=1;i<outerPts.length;i++) ctx.lineTo(outerPts[i].x,outerPts[i].y);
      ctx.closePath();
      ctx.moveTo(innerPts[innerPts.length-1].x, innerPts[innerPts.length-1].y);
      for(let i=innerPts.length-2;i>=0;i--) ctx.lineTo(innerPts[i].x,innerPts[i].y);
      ctx.closePath();
      const grad = ctx.createRadialGradient(cx,cy,maxR*0.95,cx,cy,maxR*1.38);
      grad.addColorStop(0,   'rgba(255,255,220,0)');
      grad.addColorStop(0.3, 'rgba(255,255,230,0.55)');
      grad.addColorStop(0.55,'rgba(255,255,240,0.90)');
      grad.addColorStop(0.75,'rgba(255,252,220,0.55)');
      grad.addColorStop(1,   'rgba(255,252,210,0)');
      ctx.fillStyle = grad;
      ctx.fill('evenodd');
      ctx.restore();
    }

    // ---- Vraies lunettes de soleil SVG (monture rectangulaire) ----
    function showGlasses(lm, W, H, flip) {
      const lOuter=pt(lm,33,W,H,flip), lInner=pt(lm,133,W,H,flip);
      const rInner=pt(lm,362,W,H,flip), rOuter=pt(lm,263,W,H,flip);
      if (!lOuter||!lInner||!rInner||!rOuter) return;
      const lCX=(lOuter.x+lInner.x)/2, lCY=(lOuter.y+lInner.y)/2;
      const rCX=(rInner.x+rOuter.x)/2, rCY=(rInner.y+rOuter.y)/2;
      const totalW=Math.abs(rOuter.x-lOuter.x);
      const lensW=totalW*0.385, lensH=lensW*0.68, corner=lensH*0.22;
      const angle=Math.atan2(rOuter.y-lOuter.y,rOuter.x-lOuter.x);
      const deg=angle*180/Math.PI;
      const pivotX=(lCX+rCX)/2, pivotY=(lCY+rCY)/2;
      const armLen=lensW*0.9;
      const bridgeCY=(lInner.y+rInner.y)/2;
      if (!glassesEl) {
        glassesEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
        glassesEl.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:4;pointer-events:none;overflow:visible;';
        document.getElementById('camera-container').appendChild(glassesEl);
      }
      glassesEl.setAttribute('viewBox',`0 0 ${W} ${H}`);
      glassesEl.innerHTML = `<defs>
          <linearGradient id="lensShine" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2a1a00"/>
            <stop offset="100%" stop-color="#0a0800"/>
          </linearGradient>
          <filter id="lensDrop">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
          </filter>
        </defs>
        <g transform="rotate(${deg},${pivotX},${pivotY})" filter="url(#lensDrop)">
          <line x1="${lCX-lensW*0.92}" y1="${lCY}" x2="${lCX-lensW*0.92-armLen}" y2="${lCY+lensH*0.15}"
            stroke="url(#frameGrad)" stroke-width="${lensH*0.10}" stroke-linecap="round"/>
          <rect x="${lCX-lensW}" y="${lCY-lensH/2}" width="${lensW*2}" height="${lensH}"
            rx="${corner}" ry="${corner}" fill="rgba(15,10,30,0.82)"

    function drawEyeBlurOverlay() {
      if (!eyeBlurCtx||!eyeBlurCanvas) return;
      const W=window.innerWidth, H=window.innerHeight;
      if(eyeBlurCanvas.width!==W||eyeBlurCanvas.height!==H){eyeBlurCanvas.width=W;eyeBlurCanvas.height=H;}
      eyeBlurCtx.clearRect(0,0,W,H);
      if (!lastFaceLandmarks||!lastFaceLandmarks.length) return;
      const lm=lastFaceLandmarks, flip=facingMode==='user';
      const video=document.getElementById('camera-preview');
      if (!video||video.readyState<2) return;
      const vW=video.videoWidth||W, vH=video.videoHeight||H;
      const vr=vW/vH, cr=W/H;
      let sx=0,sy=0,sw=vW,sh=vH;
      if(vr>cr){sw=vH*cr;sx=(vW-sw)/2;}else{sh=vW/cr;sy=(vH-sh)/2;}
      [MP_LEFT_EYE_INNER,MP_RIGHT_EYE_INNER].forEach(eyePts => {
        const pts=eyePts.map(i=>pt(lm,i,W,H,flip)).filter(Boolean);
        if(pts.length<4) return;
        const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length;
        const cy=pts.reduce((s,p)=>s+p.y,0)/pts.length;
        const rad=Math.max(...pts.map(p=>Math.sqrt((p.x-cx)**2+(p.y-cy)**2)))*3.0;
        const tmp=document.createElement('canvas');
        tmp.width=W; tmp.height=H;
        const tCtx=tmp.getContext('2d');
        tCtx.save();
        if(flip){tCtx.translate(W,0);tCtx.scale(-1,1);}
        tCtx.filter='blur(16px)';
        tCtx.drawImage(video,sx,sy,sw,sh,0,0,W,H);
        tCtx.restore();
        eyeBlurCtx.save();
        eyeBlurCtx.beginPath();
        eyeBlurCtx.arc(cx,cy,rad,0,Math.PI*2);
        eyeBlurCtx.clip();
        eyeBlurCtx.drawImage(tmp,0,0);
        const fade=eyeBlurCtx.createRadialGradient(cx,cy,rad*0.5,cx,cy,rad);
        fade.addColorStop(0,'rgba(0,0,0,0)');
        fade.addColorStop(1,'rgba(0,0,0,1)');
        eyeBlurCtx.globalCompositeOperation='destination-out';
        eyeBlurCtx.fillStyle=fade;
        eyeBlurCtx.beginPath();
        eyeBlurCtx.arc(cx,cy,rad,0,Math.PI*2);
        eyeBlurCtx.fill();
        eyeBlurCtx.globalCompositeOperation='source-over';
        eyeBlurCtx.restore();
      });
